<template>
    <div class="leaderboard-card">
        <div class="card-header">
            <div>
                <h2 class="card-title">Top Reps</h2>
                <p class="card-subtitle">by total quote value</p>
            </div>
        </div>
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <template if:true={hasReps}>
                <ul class="leaderboard-list">
                    <template for:each={rankedReps} for:item="rep">
                        <li key={rep.ownerId} class="leaderboard-item">
                            <div class="rep-row">
                                <span class={rep.rankClass}>{rep.rank}</span>
                                <div class="rep-info">
                                    <p class="rep-name">{rep.ownerName}</p>
                                    <p class="rep-meta">{rep.quoteCount} quotes</p>
                                </div>
                                <p class="rep-value">{rep.formattedValue}</p>
                            </div>
                        </li>
                    </template>
                </ul>
            </template>
            <template if:false={hasReps}>
                <div class="empty-state">
                    <p>No rep data available.</p>
                </div>
            </template>
        </template>
    </div>
</template>
