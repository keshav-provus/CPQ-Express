<template>
    <div class="manager-card">
        <div class="card-header">
            <div class="header-content">
                <div class="icon-circle">📄</div>
                <div>
                    <h2>Template Manager</h2>
                    <p>Upload and manage custom HTML quote templates</p>
                </div>
            </div>
            <button class="btn btn-primary" onclick={openUploadModal}>
                <span class="icon">+</span> New Template
            </button>
        </div>

        <div class="card-body">
            <template if:true={isLoading}>
                <div class="loader">Loading templates...</div>
            </template>

            <template if:false={isLoading}>
                <div class="template-grid" if:true={hasTemplates}>
                    <template for:each={templates} for:item="temp">
                        <div key={temp.Id} class={temp.cardClass}>
                            <div class="temp-header">
                                <div class="temp-title">
                                    <h3>{temp.Name}</h3>
                                    <span if:true={temp.Is_Default__c} class="badge-default">DEFAULT</span>
                                </div>
                                <div class="temp-meta">Created {temp.timeAgo}</div>
                            </div>
                            <p class="temp-desc">{temp.Description__c}</p>
                            <div class="temp-footer">
                                <div class="actions">
                                    <button class="btn-text" onclick={handleSetDefault} data-id={temp.Id} disabled={temp.Is_Default__c}>
                                        Set Default
                                    </button>
                                </div>
                                <button class="btn-icon-delete" onclick={handleDelete} data-id={temp.Id} title="Delete Template">
                                    <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="currentColor"/></svg>
                                </button>
                            </div>
                        </div>
                    </template>
                </div>

                <div class="empty-state" if:false={hasTemplates}>
                    <div class="empty-icon">📂</div>
                    <h3>No templates found</h3>
                    <p>Start by uploading your first HTML quote template.</p>
                </div>
            </template>
        </div>

        <!-- Upload/Edit Modal -->
        <template if:true={isModalOpen}>
            <div class="modal-overlay">
                <div class="modal-container">
                    <div class="modal-header">
                        <h2>Create New Template</h2>
                        <button class="btn-close" onclick={closeModal}>&times;</button>
                    </div>
                    <div class="modal-content">
                        <div class="form-group">
                            <label>Template Name</label>
                            <input type="text" value={newName} oninput={handleNameChange} placeholder="e.g. Premium Modern Theme"/>
                        </div>
                        <div class="form-group">
                            <label>Description</label>
                            <input type="text" value={newDesc} oninput={handleDescChange} placeholder="Brief description of this layout"/>
                        </div>
                        
                        <div class="upload-section">
                            <div class="file-input-wrapper">
                                <button class="btn-upload">📁 Upload HTML File</button>
                                <input type="file" accept=".html" onchange={handleFileUpload}/>
                            </div>
                            <span class="sep">OR PASTE HTML</span>
                        </div>

                        <div class="form-group">
                            <lightning-textarea label="HTML Content" variant="label-hidden" value={newHtml} onchange={handleHtmlChange} placeholder="Paste your HTML with placeholders here..." rows="8"></lightning-textarea>
                        </div>

                        <div class="guide-box">
                            <h4>💡 Quick Placeholder Guide</h4>
                            <div class="tags">
                                <span>[[Quote.Name]]</span>
                                <span>[[Account.Name]]</span>
                                <span>[[Quote.Total_Amount__c]]</span>
                                <span>[[LINE_ITEMS_START]]...[[LINE_ITEMS_END]]</span>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" onclick={closeModal}>Cancel</button>
                        <button class="btn btn-primary" onclick={handleSave} disabled={isSaveDisabled}>
                            Save Template
                        </button>
                    </div>
                </div>
            </div>
        </template>
    </div>
</template>
