<template>
    <div class="manager-card">
        <div class="card-header">
            <div class="header-content">
                <div class="icon-circle">📄</div>
                <div>
                    <h2>Interactive Template Builder</h2>
                    <p>Design your quote PDF layout. The fields below will be converted into a reusable template.</p>
                </div>
            </div>
            <button class="btn btn-primary" onclick={handleSaveTemplate} disabled={isSaving}>
                <span class="icon">💾</span> Save Quote Template
            </button>
        </div>

        <div class="card-body template-builder-body">
            <!-- This container represents the PDF page boundary -->
            <div class="pdf-demo-page">

                <!-- HEADER SECTION -->
                <div class="pdf-header">
                    <div class="pdf-header-left">
                        <!-- Logo Upload / Display -->
                        <div class="logo-container" onclick={triggerLogoUpload}>
                            <template if:true={logoDataUrl}>
                                <img src={logoDataUrl} class="company-logo" alt="Company Logo"/>
                            </template>
                            <template if:false={logoDataUrl}>
                                <div class="upload-placeholder logo-placeholder">
                                    <span>Click to upload<br/>Company Logo</span>
                                </div>
                            </template>
                            <input type="file" class="hidden-file-input" accept="image/png, image/jpeg" onchange={handleLogoUpload} data-id="logoInput"/>
                        </div>

                        <!-- Editable Company Info -->
                        <div class="company-info-edit" style="color:#666;">
                            [Company details managed in Admin Settings]
                        </div>
                    </div>

                    <div class="pdf-header-right">
                        <div class="quote-badge">SALES QUOTE</div>
                        <div class="quote-number-demo">#8829-REV-2</div>
                        <div class="quote-meta-demo">
                            <div><span class="meta-label">Created:</span> Oct 24, 2024</div>
                            <div><span class="meta-label">Expires:</span> Nov 23, 2024</div>
                            <div><span class="meta-label">Owner:</span> Alex Mercer</div>
                        </div>
                    </div>
                </div>

                <!-- PREPARED FOR SECTION -->
                <div class="prepared-for-section">
                    <div class="prepared-label">PREPARED FOR</div>
                    <div class="client-name-demo">Horizon Digital Systems</div>
                    <div class="client-attn-demo">Attn: Sarah Jenkins, CTO</div>
                </div>

                <!-- LINE ITEMS TABLE -->
                <div class="line-items-section">
                    <table class="demo-table">
                        <thead>
                            <tr>
                                <th class="col-product">PRODUCT DETAILS</th>
                                <th class="col-qty">QTY</th>
                                <th class="col-price">LIST PRICE</th>
                                <th class="col-disc">DISC %</th>
                                <th class="col-total">NET TOTAL</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td class="col-product">
                                    <div class="product-name">Lattice Core Platform - Enterprise</div>
                                    <div class="product-desc">Annual Subscription (Tier 3 Pricing)</div>
                                </td>
                                <td class="col-qty">1</td>
                                <td class="col-price">$45,000.00</td>
                                <td class="col-disc disc-val">15%</td>
                                <td class="col-total">$38,250.00</td>
                            </tr>
                            <tr>
                                <td class="col-product">
                                    <div class="product-name">Edge Node Connector</div>
                                    <div class="product-desc">Multi-region active/active setup</div>
                                </td>
                                <td class="col-qty">12</td>
                                <td class="col-price">$1,200.00</td>
                                <td class="col-disc disc-val">10%</td>
                                <td class="col-total">$12,960.00</td>
                            </tr>
                            <tr>
                                <td class="col-product">
                                    <div class="product-name">Professional Services - Onboarding</div>
                                    <div class="product-desc">Fixed Fee Milestone 1 & 2</div>
                                </td>
                                <td class="col-qty">1</td>
                                <td class="col-price">$12,500.00</td>
                                <td class="col-disc disc-val">0%</td>
                                <td class="col-total">$12,500.00</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- SUMMARY SECTION -->
                <div class="summary-section">
                    <div class="summary-box">
                        <div class="summary-row">
                            <span class="summary-label">Total Products</span>
                            <span class="summary-val">14 Items</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Total Phases</span>
                            <span class="summary-val">3 Active</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label">Subtotal</span>
                            <span class="summary-val">$71,900.00</span>
                        </div>
                        <div class="summary-row">
                            <span class="summary-label highlight">Combined Discount</span>
                            <span class="summary-val highlight">-$8,190.00</span>
                        </div>
                        <div class="summary-row grand-total-row">
                            <span class="summary-label">GRAND TOTAL</span>
                            <span class="summary-val grand-total-val">$63,710.00</span>
                        </div>
                    </div>
                </div>

                <!-- FOOTER / SIGNATURE -->
                <div class="pdf-footer">
                    <div class="signature-section">
                        <div class="signature-label">Authorized Signature</div>
                        <div class="signature-container" onclick={triggerSignatureUpload}>
                            <template if:true={signatureDataUrl}>
                                <img src={signatureDataUrl} class="signature-img" alt="Authorized Signature"/>
                            </template>
                            <template if:false={signatureDataUrl}>
                                <div class="upload-placeholder signature-placeholder">
                                    <span>Click to upload<br/>Signature Image</span>
                                </div>
                            </template>
                            <input type="file" class="hidden-file-input" accept="image/png, image/jpeg" onchange={handleSignatureUpload} data-id="signatureInput"/>
                        </div>
                        <div class="signature-line"></div>
                        <div style="color:#666; font-size:11px;">[Signer Info managed in Admin Settings]</div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</template>
