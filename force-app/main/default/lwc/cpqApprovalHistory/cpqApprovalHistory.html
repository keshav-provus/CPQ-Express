<template>
    <div class="approval-card">

        <div class="approval-header">
            <div class="header-left">
                <h3 class="approval-title">Approval History</h3>
                <p class="approval-subtitle">
                    Track the approval lifecycle for this quote.
                </p>
            </div>
            <template if:true={hasStatus}>
                <span class={statusBadgeClass}>{statusLabel}</span>
            </template>
        </div>

        <!-- Empty state -->
        <template if:true={isEmpty}>
            <div class="empty-state">
                <div class="empty-icon-wrap">
                    <span class="empty-icon">📋</span>
                </div>
                <p class="empty-text">
                    No approval history yet.
                </p>
                <p class="empty-subtext">
                    Submit this quote for approval to begin the approval process.
                </p>
            </div>
        </template>

        <!-- History entries -->
        <template if:false={isEmpty}>
            <div class="history-list">
                <template for:each={historyEntries}
                          for:item="entry">
                    <div key={entry.id} class="history-entry">
                        <div class="entry-dot-wrap">
                            <div class={entry.dotClass}></div>
                            <div class="entry-line"></div>
                        </div>
                        <div class="entry-content">
                            <div class="entry-header">
                                <template if:true={entry.userName}>
                                    <span class="entry-user">
                                        {entry.userName}
                                    </span>
                                </template>
                                <span class="entry-action">
                                    {entry.action}
                                </span>
                            </div>
                            <template if:true={entry.comment}>
                                <div class="entry-comment">
                                    {entry.comment}
                                </div>
                            </template>
                            <template if:true={entry.timeDisplay}>
                                <div class="entry-time">
                                    {entry.timeDisplay}
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>

    </div>
</template>
