<template>
    <div class="card-wrapper">
        <div class="card-header">
            <h2 class="card-title">Pending Action Items</h2>
        </div>
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <template if:true={hasItems}>
                <div class="table-wrapper">
                    <table class="action-table">
                        <thead>
                            <tr>
                                <th class="th-name">OPPORTUNITY NAME</th>
                                <th class="th-quote">QUOTE ID</th>
                                <th class="th-value">VALUE</th>
                                <th class="th-date">DUE DATE</th>
                                <th class="th-status">STATUS</th>
                                <th class="th-actions">ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={items} for:item="item">
                                <tr key={item.Id} class="table-row">
                                    <td class="td-name">
                                        <p class="opp-name">{item.oppName}</p>
                                        <p class="account-name">{item.accountName}</p>
                                    </td>
                                    <td class="td-quote">
                                        <a href={item.quoteUrl} class="quote-link">{item.Name}</a>
                                    </td>
                                    <td class="td-value">{item.formattedValue}</td>
                                    <td class={item.dueDateClass}>{item.formattedDate}</td>
                                    <td class="td-status">
                                        <span class={item.statusBadgeClass}>{item.statusLabel}</span>
                                    </td>
                                    <td class="td-actions">
                                        <a href={item.quoteUrl} title="View" class="action-icon">
                                            <lightning-icon icon-name="utility:preview" size="xx-small"></lightning-icon>
                                        </a>
                                        <a href={item.editUrl} title="Edit" class="action-icon">
                                            <lightning-icon icon-name="utility:edit" size="xx-small"></lightning-icon>
                                        </a>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
            <template if:false={hasItems}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:check" size="medium" class="empty-icon"></lightning-icon>
                    <p class="empty-text">All caught up! No pending action items.</p>
                </div>
            </template>
        </template>
    </div>
</template>
