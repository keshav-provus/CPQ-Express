<template>
    <div class="actions-card">
        <h3 class="card-title">Actions</h3>
        <div class="button-stack">
            <template if:true={isDraft}>
                <button class="submit-btn" onclick={handleSubmit}>
                    <lightning-icon icon-name="utility:send" size="small" class="btn-icon-white"></lightning-icon>
                    Submit for Approval
                </button>
            </template>
            <template if:true={isPending}>
                <div style="display:flex; gap:8px;">
                    <button class="submit-btn" style="flex:1; background-color:#2e844a;" onclick={handleApprove}>
                        <lightning-icon icon-name="utility:check" size="small" class="btn-icon-white"></lightning-icon>
                        Approve
                    </button>
                    <button class="submit-btn" style="flex:1; background-color:#c23934;" onclick={handleReject}>
                        <lightning-icon icon-name="utility:close" size="small" class="btn-icon-white"></lightning-icon>
                        Reject
                    </button>
                </div>
            </template>
            <div class="secondary-grid">
                <button class="grid-btn bg-purple" onclick={handlePDF}>Generate PDF</button>
            </div>
        </div>
    </div>
</template>
