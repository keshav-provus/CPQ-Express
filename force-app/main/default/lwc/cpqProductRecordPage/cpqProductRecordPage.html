<template>
<main class="product-page">
<!-- Resource Info Header -->
<header class="page-header">
    <div class="header-left">
        <nav class="breadcrumb">
            <span>Products</span>
            <lightning-icon icon-name="utility:chevronright" size="xx-small" class="breadcrumb-chevron"></lightning-icon>
            <span class="breadcrumb-active"><template if:true={product}>{product.Product_Type__c}</template></span>
        </nav>
        <h1 class="page-title"><template if:true={product}>{product.Name}</template></h1>
        <p class="page-subtitle"><template if:true={product}>{product.Description__c}</template></p>
    </div>
    <div class="header-stats">
        <div class="stat-chip">
            <span class="stat-chip-label">Avg Sales Price</span>
            <span class="stat-chip-value"><template if:true={product}><lightning-formatted-number value={product.Price__c} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></template></span>
        </div>
        <div class="stat-chip">
            <span class="stat-chip-label">Resource Cost</span>
            <span class="stat-chip-value"><template if:true={product}><lightning-formatted-number value={product.Cost__c} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></template></span>
        </div>
        <div class="stat-chip">
            <span class="stat-chip-label">Billing Unit</span>
            <span class="stat-chip-value"><template if:true={product}>{product.Billing_Unit__c}</template></span>
        </div>
    </div>
</header>

<!-- Metric Grid -->
<section class="kpi-grid">
    <div class="kpi-card">
        <div class="kpi-icon-row">
            <div class="kpi-icon-wrap kpi-icon-blue">
                <lightning-icon icon-name="utility:moneybag" size="small"></lightning-icon>
            </div>
        </div>
        <p class="kpi-label">Total Revenue</p>
        <h2 class="kpi-value">{formattedKpiRevenue}</h2>
    </div>
    <div class="kpi-card">
        <div class="kpi-icon-row">
            <div class="kpi-icon-wrap kpi-icon-purple">
                <lightning-icon icon-name="utility:file" size="small"></lightning-icon>
            </div>
        </div>
        <p class="kpi-label">Active Quotes</p>
        <h2 class="kpi-value">{kpiActiveQuotes}</h2>
    </div>
    <div class="kpi-card">
        <div class="kpi-icon-row">
            <div class="kpi-icon-wrap kpi-icon-green">
                <lightning-icon icon-name="utility:trending" size="small"></lightning-icon>
            </div>
        </div>
        <p class="kpi-label">Peak Utilisation</p>
        <h2 class="kpi-value">{kpiPeakUsage}</h2>
    </div>
    <div class="kpi-card">
        <div class="kpi-icon-row">
            <div class="kpi-icon-wrap kpi-icon-gray">
                <lightning-icon icon-name="utility:clock" size="small"></lightning-icon>
            </div>
        </div>
        <p class="kpi-label">Avg Duration</p>
        <h2 class="kpi-value">{kpiDuration}</h2>
    </div>
</section>

<!-- Main Content Split -->
<div class="content-grid">
    <!-- Chart Section (Gantt) -->
    <section class="chart-panel">
        <div class="panel-header-row">
            <div>
                <h3 class="panel-title">Resource Utilisation Timeline</h3>
                <p class="panel-subtitle">Projected allocation across quotes</p>
            </div>
        </div>

        <div class="filter-row">
            <span class="filter-label">Filter by account:</span>
            <div class="search-wrapper">
                <div class="search-input-container">
                    <input 
                        class="search-input" 
                        type="search" 
                        placeholder="Search account..." 
                        value={searchTerm} 
                        oninput={handleSearchChange}
                        onclick={handleSearchClick}
                        onblur={handleSearchBlur}
                        autocomplete="off" />
                    <template if:true={isDropdownOpen}>
                        <div class="search-dropdown">
                            <template for:each={filteredAccountOptions} for:item="acc">
                                <div key={acc} class="search-option" onmousedown={handleAccountSelect} data-val={acc}>{acc}</div>
                            </template>
                            <template if:false={filteredAccountOptions.length}>
                                <div class="search-option search-option-empty">No matching accounts</div>
                            </template>
                        </div>
                    </template>
                </div>
                <button onclick={handleSearchSubmit} class="done-btn">Done</button>
            </div>
        </div>

        <div class="gantt-container" lwc:dom="manual"></div>
        <div class="legend-row" lwc:dom="manual"></div>
    </section>

    <!-- Configuration/Table Section -->
    <section class="sidebar-panel">
        <div class="sidebar-card">
            <!-- Discount Tiers - delegated entirely to child component -->
            <div class="tiers-body">
                <c-cpq-product-discount-tiers record-id={recordId} object-api-name="Product__c"></c-cpq-product-discount-tiers>
            </div>

            <!-- Summary Panel -->
            <template if:true={product}>
                <div class="summary-section">
                    <div class="summary-card">
                        <div class="summary-header">
                            <lightning-icon icon-name="utility:settings" size="x-small" class="summary-icon"></lightning-icon>
                            <h4 class="summary-title">CONFIGURATION SUMMARY</h4>
                        </div>
                        <div class="summary-fields">
                            <div class="summary-field">
                                <span class="summary-field-label">Default Discount</span>
                                <span class="summary-field-value">{product.Default_Discount__c}%</span>
                            </div>
                            <div class="summary-field">
                                <span class="summary-field-label">Billing Unit</span>
                                <span class="summary-field-value">{product.Billing_Unit__c}</span>
                            </div>
                            <div class="summary-field">
                                <span class="summary-field-label">Product Code</span>
                                <span class="summary-field-value">{product.Product_Code__c}</span>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </section>
</div>

<!-- Tooltip -->
<div class="tooltip-box" lwc:dom="manual"></div>
</main>
</template>
