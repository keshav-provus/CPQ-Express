<template>
    <div class="page-wrapper">
        <div class="page">
            
            <template if:true={product}>
                <div class="highlight-bar">
                  <div class="hl-left">
                    <div>
                      <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
                        <span class="hl-name">{product.Name}</span>
                        <span class="hl-badge"><span class="hl-dot"></span>{product.Product_Type__c}</span>
                      </div>
                      <span class="hl-meta">{product.Product_Code__c} &nbsp;·&nbsp; {product.Category__r.Name}</span>
                    </div>
                  </div>
                  <div class="hl-fields">
                    <div class="hl-field"><div class="lbl">Avg. sales price</div><div class="val"><lightning-formatted-number value={product.Price__c} format-style="currency"></lightning-formatted-number></div></div>
                    <div class="hl-field"><div class="lbl">Cost</div><div class="val" style="color:#0F6E56;"><lightning-formatted-number value={product.Cost__c} format-style="currency"></lightning-formatted-number></div></div>
                    <div class="hl-field"><div class="lbl">Default discount</div><div class="val">{product.Default_Discount__c}%</div></div>
                    <div class="hl-field"><div class="lbl">Billing unit</div><div class="val">{product.Billing_Unit__c}</div></div>
                    <div class="hl-field"><div class="lbl">Product code</div><div class="val">{product.Product_Code__c}</div></div>
                    <div class="hl-field"><div class="lbl">Category</div><div class="val">{product.Category__r.Name}</div></div>
                  </div>
                  <div class="hl-actions">
                    <button class="btn">Edit</button>
                    <button class="btn btn-primary">Configure rules</button>
                  </div>
                </div>
            </template>

            <div class="tabs-bar">
              <div class={timelineTabClass} data-tab="timeline" onclick={handleTabClick}>Resource timeline</div>
              <div class={relatedTabClass} data-tab="related" onclick={handleTabClick}>Related lists</div>
              <div class={configTabClass} data-tab="config" onclick={handleTabClick}>Configuration</div>
            </div>

            <div class="main-content">
              <div class="kpi-row">
                <div class="kpi-card">
                  <div class="klbl">Total revenue generated</div>
                  <div class="kval">{formattedKpiRevenue}</div>
                  <div class="kdelta up">Historical calculation</div>
                </div>
                <div class="kpi-card">
                  <div class="klbl">Active quotes using this</div>
                  <div class="kval">{kpiActiveQuotes}</div>
                  <div class="kdelta" style="color:var(--color-text-secondary);">Currently in pipeline</div>
                </div>
                <div class="kpi-card">
                  <div class="klbl">Peak utilisation</div>
                  <div class="kval">{kpiPeakUsage}</div>
                  <div class="kdelta" style="color:var(--color-text-secondary);">Month with most active quotes</div>
                </div>
                <div class="kpi-card">
                  <div class="klbl">Avg. contract duration</div>
                  <div class="kval">{kpiDuration}</div>
                  <div class="kdelta up">Average across active quotes</div>
                </div>
              </div>

              <template if:true={isTimeline}>
                  <div>
                    <div class="card">
                      <div class="card-title">
                        <span>Resource utilisation timeline</span>
                        <span class="ct-right">Bar width = revenue contribution &nbsp;·&nbsp; Y-axis = % of total product revenue</span>
                      </div>
                      <div class="filter-row">
                        <span style="font-size:11px;color:var(--color-text-secondary);margin-right:8px;">Filter by account:</span>
                        <div class="search-container">
                            <lightning-input 
                                class="account-search-input" 
                                type="search" 
                                placeholder="Search account..." 
                                variant="label-hidden" 
                                value={searchTerm} 
                                onchange={handleSearchChange}>
                            </lightning-input>
                            <lightning-button 
                                label="Done" 
                                onclick={handleSearchSubmit} 
                                variant="brand" 
                                class="done-btn">
                            </lightning-button>
                        </div>
                      </div>
                      <div class="timeline-wrap" lwc:dom="manual"></div>
                      <div class="legend-row" lwc:dom="manual"></div>
                    </div>
                  </div>
              </template>

              <template if:true={isRelated}>
                  <div>
                    <div class="two-col">
                      <div style="display:flex;flex-direction:column;gap:12px;">
                        <div class="card">
                          <div class="card-title">Discount tiers</div>
                          <table class="tiers-table">
                            <thead><tr><th>Quantity range</th><th>Discount %</th></tr></thead>
                            <tbody>
                              <template for:each={discountTiers} for:item="tier">
                                  <tr key={tier.Id}>
                                      <td>{tier.Quantity_Range__c} units</td>
                                      <td class="disc">{tier.Discount_Percent__c}%</td>
                                  </tr>
                              </template>
                              <template if:false={discountTiers.length}>
                                  <tr><td colspan="2">No discount tiers defined.</td></tr>
                              </template>
                            </tbody>
                          </table>
                        </div>
                        <div class="card">
                          <div class="card-title">Product add-ons</div>
                          <div class="addons-list">
                            <template for:each={addOns} for:item="addon">
                                <div key={addon.Id} class="addon-row">
                                    <span class="an">{addon.Name__c}</span>
                                    <span class="ap"><lightning-formatted-number value={addon.Price__c} format-style="currency"></lightning-formatted-number> / {addon.Billing_Unit__c}</span>
                                </div>
                            </template>
                            <template if:false={addOns.length}>
                                <div class="addon-row"><span class="an" style="color:var(--color-text-secondary);">No add-ons available.</span></div>
                            </template>
                          </div>
                        </div>
                      </div>
                      <div class="card">
                        <div class="card-title">Price trend <span class="ct-right">Last 12 months</span></div>
                        <div class="price-bars" lwc:dom="manual"></div>
                        <div class="price-bar-labels"><span>Apr</span><span>Aug</span><span>Dec</span><span>Mar</span></div>
                        <div style="margin-top:10px;padding-top:10px;border-top:0.5px solid var(--color-border-tertiary);display:flex;justify-content:space-between;font-size:12px;">
                          <span style="color:var(--color-text-secondary);">Current MSRP</span>
                          <span style="font-weight:500;"><lightning-formatted-number value={productPrice} format-style="currency"></lightning-formatted-number></span>
                        </div>
                      </div>
                    </div>
                  </div>
              </template>

              <template if:true={isConfig}>
                  <div>
                    <div class="card" style="max-width:600px;">
                      <div class="card-title">Configuration specifications</div>
                      <div class="details-grid">
                        <template if:true={product}>
                            <div class="dg-item"><div class="dlbl">Product Name</div><div class="dval">{product.Name}</div></div>
                            <div class="dg-item"><div class="dlbl">Product Code</div><div class="dval">{product.Product_Code__c}</div></div>
                            <div class="dg-item"><div class="dlbl">Type</div><div class="dval">{product.Product_Type__c}</div></div>
                            <div class="dg-item"><div class="dlbl">Status</div><div class="dval">{product.Active__c}</div></div>
                            <div class="dg-item" style="grid-column: span 2;"><div class="dlbl">Description</div><div class="dval">{product.Description__c}</div></div>
                        </template>
                      </div>
                    </div>
                  </div>
              </template>

            </div>
        </div>
        
        <div class="tooltip-box" lwc:dom="manual"></div>
    </div>
</template>
