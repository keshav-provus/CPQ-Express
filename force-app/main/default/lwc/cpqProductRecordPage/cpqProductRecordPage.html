<template>
    <div class="bg-surface text-on-surface min-h-screen">
        <main class="w-full p-8 space-y-8">
            <!-- Summary Header -->
            <c-cpq-product-header record-id={recordId} product={product} onrefresh={handleRefresh}></c-cpq-product-header>

            <div class="grid grid-cols-12 gap-8 items-start">
                <!-- Left Main Content Area -->
                <div class="col-span-12 lg:col-span-8 space-y-8">
                    <!-- Tabs -->
                    <div class="border-b border-surface-container-high flex gap-8">
                        <button class={detailsTabClass} data-tab="details" onclick={handleTabClick}>Details</button>
                        <button class={relatedTabClass} data-tab="related" onclick={handleTabClick}>Related Lists</button>
                        <button class={configTabClass} data-tab="config" onclick={handleTabClick}>Configuration Specs</button>
                    </div>

                    <!-- Tab Content -->
                    <template if:true={isDetails}>
                        <c-cpq-product-details record-id={recordId} product={product}></c-cpq-product-details>
                    </template>

                    <template if:true={isRelated}>
                        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                            <c-cpq-product-discount-tiers record-id={recordId}></c-cpq-product-discount-tiers>
                            <c-cpq-product-add-ons record-id={recordId}></c-cpq-product-add-ons>
                        </div>
                    </template>

                    <template if:true={isConfig}>
                        <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)]">
                            <p class="text-on-surface-variant">Configuration specifications will be implemented soon.</p>
                        </div>
                    </template>
                </div>

                <!-- Right Sidebar Content -->
                <div class="col-span-12 lg:col-span-4 space-y-8">
                    <!-- Configuration Visual Preview -->
                    <div class="bg-surface-container-lowest p-1 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)] overflow-hidden">
                        <div class="aspect-video w-full bg-slate-900 overflow-hidden rounded-lg">
                            <img alt="Configuration preview" class="w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB2e781_up_Eingqo1nWHW_fydR8oQx3HROgkpxOdTo7d6GryQogSghb2ZpuTQtgbAdUOy-58EpnqEbP8cv3XU2-YYJGCuBn5IzTYKBB5EDJ-RCTs0xGZUI4N4HpsmaU2QP2bhAeGNnhPk3MiIhgg2XOufr2HO1asrSXdhsRQGLMO2tP8aMC23f_AsTmZsHQCtPOkTQp8Ha4hGAOPuiER9f4obTrlcdrzuMZ0YTVXdRl7DsRoGh6QAmYGkedxNowvZ6JLn6wNLSlyg"/>
                        </div>
                        <div class="p-6">
                            <h4 class="font-headline font-bold text-on-surface mb-2">Visual Insight</h4>
                            <p class="text-xs text-on-surface-variant leading-relaxed">Dynamic representation of the provisioned cluster for this product specification.</p>
                        </div>
                    </div>

                    <!-- Price Trends -->
                    <div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)]">
                        <div class="flex justify-between items-center mb-6">
                            <h4 class="font-headline font-bold text-on-surface">Price Trends</h4>
                            <span class="text-[10px] text-outline font-bold uppercase tracking-widest">Last 12 Mo</span>
                        </div>
                        <div class="h-32 w-full flex items-end gap-1 px-2">
                            <div class="w-full bg-indigo-50 rounded-t-sm h-[40%] hover:bg-indigo-200 transition-colors"></div>
                            <div class="w-full bg-indigo-100 rounded-t-sm h-[55%] hover:bg-indigo-200 transition-colors"></div>
                            <div class="w-full bg-indigo-50 rounded-t-sm h-[45%] hover:bg-indigo-200 transition-colors"></div>
                            <div class="w-full bg-indigo-200 rounded-t-sm h-[65%] hover:bg-indigo-300 transition-colors"></div>
                            <div class="w-full bg-indigo-400 rounded-t-sm h-[75%] hover:bg-indigo-500 transition-colors"></div>
                            <div class="w-full bg-indigo-300 rounded-t-sm h-[60%] hover:bg-indigo-400 transition-colors"></div>
                            <div class="w-full bg-indigo-500 rounded-t-sm h-[85%] hover:bg-indigo-600 transition-colors"></div>
                            <div class="w-full bg-primary rounded-t-sm h-[95%]"></div>
                        </div>
                        <div class="mt-4 pt-4 border-t border-surface-container-low flex justify-between items-center">
                            <p class="text-xs text-on-surface-variant">Current MSRP</p>
                            <p class="text-sm font-bold text-on-surface"><lightning-formatted-number value={product.Price__c} format-style="currency"></lightning-formatted-number></p>
                        </div>
                    </div>

                    <!-- Audit Timeline -->
                    <div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)]">
                        <h4 class="font-headline font-bold text-on-surface mb-6">Audit Timeline</h4>
                        <div class="space-y-6">
                            <div class="relative pl-6 border-l-2 border-indigo-100 pb-1">
                                <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-indigo-600 border-4 border-white"></div>
                                <p class="text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Today, 10:45 AM</p>
                                <p class="text-xs font-bold text-on-surface">Configuration Rule Updated</p>
                                <p class="text-[10px] text-on-surface-variant">Admin changed min quantity threshold</p>
                            </div>
                            <div class="relative pl-6 border-l-2 border-indigo-100 pb-1">
                                <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-slate-200 border-4 border-white"></div>
                                <p class="text-[10px] font-bold text-outline uppercase tracking-widest mb-1">Oct 24, 2023</p>
                                <p class="text-xs font-bold text-on-surface">Price Book Entry Added</p>
                                <p class="text-[10px] text-on-surface-variant">Automated Sync: Global Price Book</p>
                            </div>
                        </div>
                        <button class="w-full mt-6 py-2 text-[10px] font-bold text-primary uppercase tracking-widest hover:bg-indigo-50 rounded-lg transition-colors">View All Activities</button>
                    </div>
                </div>
            </div>
        </main>
    </div>
</template>
