<template>
    <div class="kpi-grid">
        <!-- Total Revenue -->
        <div class="kpi-card">
            <div class="kpi-header">
                <div class="icon-wrapper icon-revenue">
                    <lightning-icon icon-name="utility:money" size="xx-small" variant="inverse" class="slds-current-color"></lightning-icon>
                </div>
                <span class="kpi-label">Total Revenue</span>
                <span class="kpi-badge badge-up">+12%</span>
            </div>
            <div class="kpi-value">{formattedRevenue}</div>
            <p class="kpi-compare">from approved quotes</p>
        </div>

        <!-- Active Quotes -->
        <div class="kpi-card">
            <div class="kpi-header">
                <div class="icon-wrapper icon-quotes">
                    <lightning-icon icon-name="utility:file" size="xx-small" variant="inverse" class="slds-current-color"></lightning-icon>
                </div>
                <span class="kpi-label">Active Quotes</span>
                <span class="kpi-badge badge-down">-8%</span>
            </div>
            <div class="kpi-value">{activeQuotes}</div>
            <p class="kpi-compare">draft, submitted &amp; pending</p>
        </div>

        <!-- Average Quote Value -->
        <div class="kpi-card">
            <div class="kpi-header">
                <div class="icon-wrapper icon-avg">
                    <lightning-icon icon-name="utility:trending" size="xx-small" variant="inverse" class="slds-current-color"></lightning-icon>
                </div>
                <span class="kpi-label">Avg Quote Value</span>
                <span class="kpi-badge badge-up">+6%</span>
            </div>
            <div class="kpi-value">{formattedAvgQuote}</div>
            <p class="kpi-compare">across all quotes</p>
        </div>

        <!-- Win Rate -->
        <div class="kpi-card">
            <div class="kpi-header">
                <div class="icon-wrapper icon-win">
                    <lightning-icon icon-name="utility:success" size="xx-small" variant="inverse" class="slds-current-color"></lightning-icon>
                </div>
                <span class="kpi-label">Win Rate</span>
            </div>
            <div class="kpi-value">{winRate}<span class="kpi-unit">%</span></div>
            <p class="kpi-compare">approved vs rejected</p>
        </div>
    </div>
</template>
