<template>
    <div class="kpi-grid">
        <!-- Total Revenue — col-span-2 -->
        <div class="kpi-card kpi-col-2">
            <span class="kpi-label">Total Revenue</span>
            <div class="kpi-body">
                <div class="kpi-value">{formattedRevenue}</div>
                <div class="kpi-trend trend-up">
                    <span class="material-symbols-outlined trend-icon">trending_up</span>+8.2%
                </div>
            </div>
        </div>

        <!-- Total Margin — col-span-3 with sparkline -->
        <div class="kpi-card kpi-col-3">
            <span class="kpi-label">Total Margin</span>
            <div class="kpi-body kpi-body-row">
                <div>
                    <div class="kpi-value">{formattedMargin}</div>
                    <div class="kpi-trend trend-up">
                        <span class="material-symbols-outlined trend-icon">trending_up</span>+12.4%
                    </div>
                </div>
                <div class="sparkline-wrap">
                    <svg class="sparkline-svg" viewBox="0 0 100 40">
                        <path d="M0,35 L10,32 L20,36 L30,25 L40,28 L50,15 L60,20 L70,10 L80,18 L90,5 L100,12" fill="none" stroke="#2563eb" stroke-linecap="round" stroke-width="2"></path>
                    </svg>
                </div>
            </div>
        </div>

        <!-- Active Quotes — col-span-2 -->
        <div class="kpi-card kpi-col-2">
            <span class="kpi-label">Active Quotes</span>
            <div class="kpi-body">
                <div class="kpi-value">{activeQuotes}</div>
                <div class="kpi-trend trend-up">
                    <span class="material-symbols-outlined trend-icon">check_circle</span>12 New
                </div>
            </div>
        </div>

        <!-- Avg Quote Value — col-span-3 -->
        <div class="kpi-card kpi-col-3">
            <span class="kpi-label">Avg Quote Value</span>
            <div class="kpi-body">
                <div class="kpi-value">{formattedAvgQuote}</div>
                <div class="kpi-trend trend-down">
                    <span class="material-symbols-outlined trend-icon">trending_down</span>-2.1%
                </div>
            </div>
        </div>

        <!-- Win Rate — col-span-2 -->
        <div class="kpi-card kpi-col-2">
            <span class="kpi-label">Win Rate</span>
            <div class="kpi-body">
                <div class="kpi-value">{winRate}<span class="kpi-unit">%</span></div>
                <div class="kpi-trend trend-up">
                    <span class="material-symbols-outlined trend-icon">moving</span>+4.5%
                </div>
            </div>
        </div>
    </div>
</template>
