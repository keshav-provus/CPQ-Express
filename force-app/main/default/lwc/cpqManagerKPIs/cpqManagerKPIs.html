<template>
    <div class="kpi-grid">
        <!-- Total Revenue -->
        <article class="kpi-card">
            <div class="kpi-top">
                <div>
                    <p class="kpi-label">Total Revenue</p>
                    <div class="kpi-value-row">
                        <p class="kpi-value">{formattedRevenue}</p>
                        <span class="kpi-trend trend-up">
                            +{revenueTrend}% <span class="material-symbols-outlined trend-arrow">north</span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="sparkline-area">
                <svg class="sparkline-svg" preserveAspectRatio="none" viewBox="0 0 100 40">
                    <defs>
                        <linearGradient id="grad-blue" x1="0%" x2="0%" y1="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#2563eb"></stop>
                            <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"></stop>
                        </linearGradient>
                    </defs>
                    <path d="M0 40 Q 25 35, 50 30 T 100 10" fill="none" stroke="#2563eb" stroke-linecap="round" stroke-width="2.5"></path>
                    <path d="M0 40 Q 25 35, 50 30 T 100 10 V 40 H 0 Z" fill="url(#grad-blue)" fill-opacity="0.1"></path>
                </svg>
            </div>
            <div class="kpi-footer">
                <p class="kpi-footer-title">Revenue Pattern</p>
                <p class="kpi-footer-sub">Current period trend</p>
            </div>
        </article>

        <!-- Active Quotes -->
        <article class="kpi-card">
            <div class="kpi-top">
                <p class="kpi-label">Active Quotes</p>
                <div class="kpi-value-row">
                    <p class="kpi-value">{activeQuotes}</p>
                    <span class="kpi-sub-text">Draft &amp; Pending</span>
                </div>
            </div>
            <div class="progress-area">
                <div class="progress-row">
                    <div class="progress-bar">
                        <div class="progress-fill" style={approvalProgressStyle}></div>
                    </div>
                    <span class="progress-pct">{approvalRate}%</span>
                </div>
            </div>
            <div class="kpi-footer">
                <p class="kpi-footer-title">Quote Velocity</p>
                <p class="kpi-footer-sub">Average {velocityDays} days to approval</p>
            </div>
        </article>

        <!-- Avg Quote Value -->
        <article class="kpi-card">
            <div class="kpi-top">
                <p class="kpi-label">Avg Quote Value</p>
                <div class="kpi-value-row">
                    <p class="kpi-value">{formattedAvgValue}</p>
                    <span class="kpi-trend trend-up">
                        +{avgTrend}% <span class="material-symbols-outlined trend-arrow">north</span>
                    </span>
                </div>
            </div>
            <div class="bar-chart-area">
                <div class="mini-bar bar-1"></div>
                <div class="mini-bar bar-2"></div>
                <div class="mini-bar bar-3"></div>
                <div class="mini-bar bar-4"></div>
                <div class="mini-bar bar-5"></div>
            </div>
            <div class="kpi-footer">
                <p class="kpi-footer-title">Deal Size Tiering</p>
                <p class="kpi-footer-sub">Enterprise accounts lead</p>
            </div>
        </article>

        <!-- Win Rate -->
        <article class="kpi-card">
            <div class="kpi-top">
                <p class="kpi-label">Win Rate</p>
                <div class="kpi-value-row">
                    <p class="kpi-value">{formattedWinRate}%</p>
                    <span class="kpi-trend-target">Target: {targetWinRate}%</span>
                </div>
            </div>
            <div class="waffle-area">
                <div class="waffle-grid">
                    <template for:each={waffleBlocks} for:item="block">
                        <div key={block.key} class={block.className}></div>
                    </template>
                </div>
            </div>
            <div class="kpi-footer">
                <p class="kpi-footer-title">Closing Performance</p>
                <p class="kpi-footer-sub">{winRateDelta}% increase over last month</p>
            </div>
        </article>
    </div>
</template>
