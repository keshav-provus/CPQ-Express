<template>
    <div class="wizard-overlay" onclick={handleOverlayClick}>
        <div class="wizard-panel">
            <div class="wizard-header">
                <h2>Add Quote Line Items</h2>
                <p>Select items to add to your quote.</p>
                <button class="wizard-close" onclick={closeWizard}>✕</button>
            </div>
            <div class="wizard-tabs">
                <div class={rolesTabClass} data-tab="roles" onclick={switchWizardTab}>{rolesTabLabel}</div>
                <div class={productsTabClass} data-tab="products" onclick={switchWizardTab}>{productsTabLabel}</div>
                <div class={addonsTabClass} data-tab="addons" onclick={switchWizardTab}>{addonsTabLabel}</div>
            </div>
            <div class="wizard-search">
                <input type="text" placeholder="Search by name, description, or ID..." oninput={handleSearch} value={searchQuery}>
            </div>
            <div class="wizard-filter-bar">
                <button class="filter-btn active">Name ↑</button>
                <button class="filter-btn">Price</button>
                <button class="filter-btn">⊕ Price Filter</button>
            </div>
            <div class="wizard-list">
                <template for:each={filteredCatalog} for:item="item">
                    <div key={item.Id} class={item.itemClass} data-id={item.Id} onclick={toggleWizardItem}>
                        <div class="check">
                            <template if:true={item.isSelected}>✓</template>
                        </div>
                        <div class="item-info">
                            <div class="item-name">{item.displayName}</div>
                            <div class="item-desc">No description available</div>
                        </div>
                        <div class="item-price">{item.displayPrice}</div>
                    </div>
                </template>
                <div if:false={filteredCatalog.length} style="padding:24px;text-align:center;color:#9ca3af;font-size:13px;">No items found</div>
            </div>
            <div class="wizard-footer">
                <button class="cancel-btn" onclick={closeWizard}>Cancel</button>
                <button class="add-btn" onclick={addSelectedItems}>
                    Add {totalSelected} Items to {targetPhase}
                </button>
            </div>
        </div>
    </div>
</template>
