<template>
    <div class="tiers-container">
        <div class="tiers-header">
            <h3 class="tiers-title">Discount Tiers</h3>
            <button onclick={handleAddTier} class="add-tier-btn">
                <lightning-icon icon-name="utility:add" size="xx-small" variant="inverse" class="add-icon"></lightning-icon>
                Add Discount Tier
            </button>
        </div>
        <div class="tiers-table-wrap">
            <table class="tiers-table">
                <thead>
                    <tr>
                        <th>Lower Bound</th>
                        <th>Upper Bound</th>
                        <th class="text-right">Discount %</th>
                    </tr>
                </thead>
                <tbody>
                    <template if:true={hasTiers}>
                        <template for:each={tiers} for:item="tier">
                            <tr key={tier.Id} class="tier-row">
                                <td class="tier-cell">{tier.Lower_Bound__c}</td>
                                <td class="tier-cell">{tier.Upper_Bound__c}</td>
                                <td class="tier-cell text-right tier-discount">{tier.Discount_Percent__c}%</td>
                            </tr>
                        </template>
                    </template>
                    <template if:false={hasTiers}>
                        <tr>
                            <td colspan="3" class="tier-cell empty-state">No discount tiers found.</td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <template if:true={isModalOpen}>
            <c-cpq-product-discount-tier-modal record-id={recordId} object-api-name={objectApiName} onclose={handleCloseModal} onsuccess={handleSaveSuccess}></c-cpq-product-discount-tier-modal>
        </template>
    </div>
</template>
