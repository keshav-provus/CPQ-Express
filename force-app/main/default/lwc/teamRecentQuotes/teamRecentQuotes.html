<template>
    <lightning-card title="All Recent Quotes" icon-name="standard:quotes">
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <template if:true={hasQuotes}>
                <lightning-datatable
                    key-field="Id"
                    data={quotes}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column
                    class="team-quotes-table"
                ></lightning-datatable>
            </template>
            <template if:false={hasQuotes}>
                <div class="slds-p-around_large slds-text-align_center">
                    <p class="slds-text-color_weak">No quotes found across the team.</p>
                </div>
            </template>
        </template>
    </lightning-card>
</template>
