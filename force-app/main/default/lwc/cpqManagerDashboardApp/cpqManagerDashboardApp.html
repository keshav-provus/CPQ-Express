<template>
    <div class="dashboard-shell">

        <!-- ═══ Main Content ═══ -->
        <main class="main-content">

            <!-- Title Row -->
            <div class="title-row">
                <div>
                    <h1 class="dash-title">Precision Dashboard</h1>
                    <p class="dash-subtitle">Strategic Analyst View • Pipeline up <span class="highlight-green">14.2%</span> this week.</p>
                </div>
                <button class="btn-new-quote" onclick={handleStartQuote}>
                    <span class="material-symbols-outlined btn-icon">add_circle</span>
                    New Quote
                </button>
            </div>

            <!-- 12-Column Grid -->
            <div class="grid-12">

                <!-- KPI Row (full 12 cols) -->
                <div class="col-span-12">
                    <c-cpq-manager-k-p-is kpi-data={kpiData}></c-cpq-manager-k-p-is>
                </div>

                <!-- Middle Row: Quotes to Approve (4) + Map (8) -->
                <div class="col-span-4 panel-height">
                    <c-cpq-pending-quotes></c-cpq-pending-quotes>
                </div>
                <div class="col-span-8 panel-height">
                    <c-cpq-quote-map></c-cpq-quote-map>
                </div>

                <!-- Bottom Row: Quote Velocity (4) + Margin Threshold (8) -->
                <div class="col-span-4 card-height">
                    <c-cpq-quote-velocity></c-cpq-quote-velocity>
                </div>
                <div class="col-span-8 card-height">
                    <c-cpq-manager-margin-config></c-cpq-manager-margin-config>
                </div>

            </div>
        </main>

        <!-- ═══ Right Sidebar: Architect AI ═══ -->
        <aside class="ai-sidebar">
            <div class="ai-glow"></div>
            <div class="ai-sidebar-inner">

                <!-- AI Header -->
                <div class="ai-header">
                    <div class="ai-header-icon">
                        <span class="material-symbols-outlined ai-icon">auto_awesome</span>
                    </div>
                    <div>
                        <h3 class="ai-title">Architect AI</h3>
                        <p class="ai-status">Intelligence Active</p>
                    </div>
                </div>

                <!-- Chat + Insights Area -->
                <div class="ai-body">
                    <c-cpq-ai-assistant mode="card"></c-cpq-ai-assistant>
                </div>

            </div>
        </aside>
    </div>
</template>
