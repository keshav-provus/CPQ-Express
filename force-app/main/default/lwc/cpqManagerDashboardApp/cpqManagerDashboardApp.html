<template>
    <div class="dashboard-shell">
        <!-- ═══ Title Row ═══ -->
        <header class="title-row">
            <div>
                <h1 class="dash-title">Welcome back, {userName}</h1>
                <p class="dash-subtitle">Here's what's happening with your quotes and pipeline today.</p>
            </div>
            <div class="title-actions">
                <button class="btn-new-quote" onclick={handleStartQuote}>
                    <span class="btn-icon">＋</span>
                    New Quote
                </button>
            </div>
        </header>

        <!-- ═══ KPI Section ═══ -->
        <section class="kpi-section">
            <div class="section-header">
                <h2 class="section-title">Sales &amp; CPQ Summary</h2>
            </div>
            <c-cpq-manager-k-p-is kpi-data={kpiData}></c-cpq-manager-k-p-is>
        </section>

        <!-- ═══ 2-Column Grid (Top) ═══ -->
        <div class="grid-2col">
            <!-- Col 1: Quotes to Approve -->
            <div class="col-quotes">
                <c-cpq-pending-quotes></c-cpq-pending-quotes>
            </div>

            <!-- Col 2: Map + Margin -->
            <div class="col-right">
                <c-cpq-quote-map></c-cpq-quote-map>
                <c-cpq-manager-margin-config></c-cpq-manager-margin-config>
            </div>
        </div>

        <!-- ═══ Full Width AI Intelligence (Bottom) ═══ -->
        <div class="col-ai-full">
            <div class="ai-panel">
                <div class="ai-glow"></div>
                <div class="ai-header">
                    <div class="ai-header-left">
                        <div class="ai-icon-wrap">
                            <span class="ai-icon">✦</span>
                        </div>
                        <h3 class="ai-title">CPQ AI Intelligence</h3>
                    </div>
                    <span class="ai-badge">Active</span>
                </div>
                <div class="ai-body">
                    <c-cpq-ai-assistant mode="card" onnavigate={handleNavigate}></c-cpq-ai-assistant>
                </div>
            </div>
        </div>
    </div>
</template>
