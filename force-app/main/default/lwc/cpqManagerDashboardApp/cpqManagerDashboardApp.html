<template>
    <div class="dashboard-shell">

        <!-- ═══ Header ═══ -->
        <header class="dash-header">
            <div class="greeting">
                <h1 class="greeting-text">Hello, {userName} <span class="wave">👋</span></h1>
                <p class="greeting-sub">Here's what's happening with your team today</p>
            </div>
            <button class="btn-start-quote" onclick={handleStartQuote}>
                <lightning-icon icon-name="utility:add" size="xx-small" class="slds-current-color slds-m-right_x-small"></lightning-icon>
                Start Quote
            </button>
        </header>

        <!-- ═══ Main Content Grid: 2fr (left) + 1fr (right sidebar) ═══ -->
        <div class="main-grid">

            <!-- ── Left Column ── -->
            <div class="left-col">

                <!-- KPI Row -->
                <div class="kpi-row">
                    <c-cpq-manager-k-p-is kpi-data={kpiData}></c-cpq-manager-k-p-is>
                </div>

                <!-- Revenue Analytics Chart -->
                <div class="chart-section">
                    <c-cpq-weekly-pipeline-chart></c-cpq-weekly-pipeline-chart>
                </div>

                <!-- Map + Margin Config Row -->
                <div class="map-margin-row">
                    <div class="map-col">
                        <c-cpq-quote-map></c-cpq-quote-map>
                    </div>
                    <div class="margin-col">
                        <c-cpq-manager-margin-config></c-cpq-manager-margin-config>
                    </div>
                </div>

                <!-- Bottom Row: Top Quotes + Top Products + Leaderboard -->
                <div class="bottom-row">
                    <c-cpq-top-transactions></c-cpq-top-transactions>
                    <c-cpq-top-products></c-cpq-top-products>
                    <c-top-rep-leaderboard dashboard-data={topReps}></c-top-rep-leaderboard>
                </div>
            </div>

            <!-- ── Right Sidebar ── -->
            <div class="right-sidebar">

                <!-- Quotes to Approve -->
                <div class="sidebar-card">
                    <c-cpq-pending-quotes></c-cpq-pending-quotes>
                </div>

                <!-- AI Assistant Card -->
                <div class="sidebar-card ai-card-wrapper">
                    <c-cpq-ai-assistant mode="card"></c-cpq-ai-assistant>
                </div>
            </div>
        </div>
    </div>
</template>
