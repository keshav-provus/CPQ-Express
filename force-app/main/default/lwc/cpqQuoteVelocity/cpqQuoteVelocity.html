<template>
    <div class="velocity-card">
        <div class="velocity-header">
            <div>
                <p class="velocity-label">Quote Velocity</p>
                <p class="velocity-subtitle">Avg. days to close quote</p>
            </div>
            <div class="velocity-stats">
                <div class="velocity-value">{averageDays} Days</div>
                <div class={trendClass}>
                    <span class="material-symbols-outlined trend-icon">trending_down</span>{trendLabel}
                </div>
            </div>
        </div>

        <!-- SVG Area Chart -->
        <div class="chart-area">
            <svg class="velocity-chart" preserveAspectRatio="none" viewBox="0 0 200 60">
                <defs>
                    <linearGradient id="vel-grad" x1="0%" x2="0%" y1="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1"></stop>
                        <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0"></stop>
                    </linearGradient>
                </defs>
                <path d="M0,50 L20,45 L40,48 L60,35 L80,38 L100,20 L120,25 L140,15 L160,18 L180,10 L200,12"
                      fill="none" stroke="#2563eb" stroke-linecap="round" stroke-width="2"></path>
                <path d="M0,50 L20,45 L40,48 L60,35 L80,38 L100,20 L120,25 L140,15 L160,18 L180,10 L200,12 V60 H0 Z"
                      fill="url(#vel-grad)" opacity="0.1"></path>
            </svg>
        </div>

        <div class="chart-labels">
            <span>Wk 1</span>
            <span>Current</span>
        </div>
    </div>
</template>
