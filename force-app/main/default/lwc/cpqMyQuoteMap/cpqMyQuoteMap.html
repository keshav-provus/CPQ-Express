<template>
    <div class="map-card">
        <div class="card-header">
            <div>
                <h2 class="card-title">Customer Growth</h2>
                <p class="card-subtitle">based on regions</p>
            </div>
        </div>
        
        <div class="map-container">
            <template if:true={hasMarkers}>
                <lightning-map 
                    map-markers={mapMarkers} 
                    zoom-level="1"
                    list-view="hidden">
                </lightning-map>
            </template>
            <template if:false={hasMarkers}>
                 <div class="slds-p-around_medium slds-text-align_center slds-text-color_weak">
                     <template if:true={isLoading}>
                         <lightning-spinner alternative-text="Loading Map" size="small"></lightning-spinner>
                     </template>
                     <template if:false={isLoading}>
                         No regional data available yet.
                     </template>
                 </div>
            </template>
        </div>
    </div>
</template>
