<template>
    <div class="header-container">
        <!-- BREADCRUMB + TOP ACTIONS -->
        <div class="top-header">
            <div class="breadcrumb-container">
                <div class="breadcrumb">
                    <span class="breadcrumb-link">Quotes</span>
                    <span class="breadcrumb-sep">›</span>
                    <strong class="breadcrumb-current">{quoteName}</strong>
                    <span class={badgeClass} data-status={status}>{status}</span>
                </div>
                <a class="click-desc" onclick={handleAiAssistant}>✏ Click to edit description</a>
            </div>
            <div class="top-actions">
                <!-- Draft: Show Submit for Approval -->
                <template if:true={isDraft}>
                    <button class="btn btn-outline-submit" onclick={handleSubmitForApproval}>Submit for Approval</button>
                </template>

                <!-- Pending Approval: Show Recall, Approve, Reject -->
                <template if:true={isPendingApproval}>
                    <button class="btn btn-outline-action" onclick={handleRecall}>
                        <span class="btn-icon">↩</span> Recall
                    </button>
                    <button class="btn btn-outline-action" onclick={handleApprove}>
                        <span class="btn-icon">✓</span> Approve
                    </button>
                    <button class="btn btn-outline-action" onclick={handleReject}>
                        <span class="btn-icon">✕</span> Reject
                    </button>
                </template>

                <div class="btn-split">
                    <button class="btn-main" onclick={handleGeneratePdf}>⬇ Generate PDF</button>
                    <button class="btn-caret" onclick={handleGeneratePdf}>▾</button>
                </div>
                <button class="btn btn-primary" onclick={handleSave}>Save</button>
                <button class="btn" onclick={handleRefresh}>↻ Refresh</button>
                <button class="btn btn-ai" onclick={handleAiAssistant}>
                    <span class="ai-icon">✦</span> AI Assistant
                </button>
            </div>
        </div>

        <!-- HIGHLIGHT BAR -->
        <div class="highlight-bar">
            <div class="highlight-item">
                <span class="label">Total amount</span>
                <strong class="value"><lightning-formatted-number value={totalAmount} format-style="currency"></lightning-formatted-number></strong>
            </div>
            <div class="highlight-item">
                <span class="label">Subtotal</span>
                <strong class="value"><lightning-formatted-number value={totalAmount} format-style="currency"></lightning-formatted-number></strong>
            </div>
            <div class="highlight-item">
                <span class="label">Margin</span>
                <strong class="value">
                    <lightning-formatted-number value={marginAmount} format-style="currency"></lightning-formatted-number>
                    ({margin}%) ℹ
                </strong>
            </div>
            <div class="highlight-item">
                <span class="label">Discount</span>
                <strong class="value">$0.00 (0%)</strong>
            </div>
            <div class="highlight-item">
                <span class="label">Start date</span>
                <strong class="value">{startDate}</strong>
            </div>
            <div class="highlight-item">
                <span class="label">End date</span>
                <strong class="value">{endDate}</strong>
            </div>
            <div class="highlight-item">
                <span class="label">Quote time period</span>
                <strong class="value">{timePeriod}</strong>
            </div>
        </div>
    </div>
</template>
