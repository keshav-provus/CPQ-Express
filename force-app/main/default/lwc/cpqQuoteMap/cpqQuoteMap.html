<template>
    <div class="map-card">
        <div class="map-header">
            <div>
                <h3 class="map-title">Regional Distribution</h3>
                <p class="map-subtitle">Live market presence</p>
            </div>
        </div>

        <!-- Loading State -->
        <template if:true={isLoading}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Loading Map" size="small"></lightning-spinner>
            </div>
        </template>

        <!-- D3 Map Container -->
        <div class="map-container" lwc:dom="manual" lwc:ref="mapContainer"></div>
        <div class="tooltip" lwc:ref="tooltip"></div>
    </div>
</template>
