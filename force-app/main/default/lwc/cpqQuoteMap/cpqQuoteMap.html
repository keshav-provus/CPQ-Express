<template>
    <div class="map-card">
        <!-- Glass overlay header -->
        <div class="map-header-overlay">
            <div>
                <h3 class="map-title">Regional Quote Distribution</h3>
                <p class="map-subtitle">Real-time Global Engagement</p>
            </div>
            <div class="region-badges">
                <template for:each={regionBadges} for:item="badge">
                    <span key={badge.key} class="region-badge">{badge.label}</span>
                </template>
            </div>
        </div>

        <!-- Loading State (shown above map container) -->
        <template if:true={isLoading}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Loading Map" size="small"></lightning-spinner>
            </div>
        </template>

        <!-- D3 Map Container (must be empty for lwc:dom="manual") -->
        <div class="tooltip" lwc:ref="tooltip"></div>
        <div class="map-container" lwc:dom="manual" lwc:ref="mapContainer"></div>
    </div>
</template>
