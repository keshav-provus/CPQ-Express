<template>
    <!-- ═══ CARD MODE (Dashboard widget) ═══ -->
    <template if:true={isCardMode}>
        <div class="ai-card">
            <div class="card-greeting">
                <span class="card-spark">✦</span>
                <div>
                    <h3 class="card-greeting-text">Hi, {userGreetingName} <span class="card-wave">👋</span></h3>
                    <p class="card-greeting-sub">How can I help you?</p>
                </div>
            </div>

            <!-- Quick Action Tiles -->
            <template if:false={hasMessages}>
                <div class="card-tiles">
                    <button class="tile" data-prompt="Give me a summary of all quotes" onclick={handleQuickAction}>
                        <span class="tile-icon tile-icon-green">📊</span>
                        <span class="tile-label">Quote Insights</span>
                    </button>
                    <button class="tile" data-prompt="Analyze margin health across the team" onclick={handleQuickAction}>
                        <span class="tile-icon tile-icon-purple">⚡</span>
                        <span class="tile-label">Margin Analysis</span>
                    </button>
                    <button class="tile" data-prompt="What products are trending?" onclick={handleQuickAction}>
                        <span class="tile-icon tile-icon-amber">📦</span>
                        <span class="tile-label">Catalog Trends</span>
                    </button>
                    <button class="tile" data-prompt="Suggest ways to improve win rate" onclick={handleQuickAction}>
                        <span class="tile-icon tile-icon-blue">💡</span>
                        <span class="tile-label">Smart Response</span>
                    </button>
                </div>
            </template>

            <!-- Chat Messages (compact) -->
            <template if:true={hasMessages}>
                <div class="card-chat-body">
                    <template for:each={messages} for:item="msg">
                        <div key={msg.id} class={msg.bubbleClass}>
                            <template if:true={msg.isAssistant}>
                                <div class="card-avatar">✦</div>
                            </template>
                            <div class="card-msg-content">
                                <div class="card-msg-text">
                                    <lightning-formatted-rich-text value={msg.text}></lightning-formatted-rich-text>
                                </div>
                            </div>
                        </div>
                    </template>
                    <template if:true={isTyping}>
                        <div class="card-message card-assistant-message">
                            <div class="card-avatar">✦</div>
                            <div class="card-msg-content">
                                <div class="card-typing">
                                    <span class="card-dot"></span>
                                    <span class="card-dot"></span>
                                    <span class="card-dot"></span>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Chat Input -->
            <div class="card-input-wrap">
                <input type="text"
                       class="card-input"
                       placeholder="Ask something…"
                       value={inputValue}
                       oninput={handleInputChange}
                       onkeyup={handleKeyDown}>
                <button class="card-send-btn" onclick={handleSend} title="Send">
                    <span class="card-send-icon">↑</span>
                </button>
            </div>
        </div>
    </template>

    <!-- ═══ PANEL MODE (Full sidebar — Light theme) ═══ -->
    <template if:false={isCardMode}>
        <div class="ai-panel">
            <!-- Header -->
            <div class="panel-header">
                <div class="header-left">
                    <h3 class="panel-title">AI Assistant</h3>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Edit">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    </button>
                    <button class="icon-btn" title="Expand">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                    </button>
                    <button class="icon-btn" onclick={handleClose} title="Collapse">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
                    </button>
                </div>
            </div>

            <!-- Chat Body -->
            <div class="chat-body">
                <template if:true={showGreeting}>
                    <div class="greeting-row">
                        <span class="greeting-icon">🌅</span>
                        <h2 class="greeting-text">Good morning, {userGreetingName}!</h2>
                    </div>
                </template>

                <template for:each={messages} for:item="msg">
                    <div key={msg.id} class={msg.bubbleClass}>
                        <!-- AI Avatar -->
                        <template if:true={msg.isAssistant}>
                            <div class="avatar ai-avatar">✦</div>
                        </template>

                        <div class="msg-content">
                            <!-- ── Text / Action Result Messages ── -->
                            <template if:true={msg.isTextType}>
                                <div class="msg-text">
                                    <lightning-formatted-rich-text value={msg.text}></lightning-formatted-rich-text>
                                </div>
                            </template>
                            
                            <!-- ── Summary Messages ── -->
                            <template if:true={msg.isSummaryType}>
                                <div class="msg-text">
                                    <lightning-formatted-rich-text value={msg.text}></lightning-formatted-rich-text>
                                </div>
                                <template if:true={msg.hasSummaryData}>
                                    <div class="summary-card">
                                        <div class="summary-kpi-row">
                                            <div class="summary-kpi">
                                                <span class="kpi-label">Revenue</span>
                                                <span class="kpi-value">${msg.data.totalAmount}</span>
                                            </div>
                                            <div class="summary-kpi">
                                                <span class="kpi-label">Margin</span>
                                                <span class="kpi-value">{msg.data.marginPercent}%</span>
                                            </div>
                                            <div class="summary-kpi">
                                                <span class="kpi-label">Items</span>
                                                <span class="kpi-value">{msg.data.lineItemCount}</span>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </template>

                            <!-- ── Insight Messages ── -->
                            <template if:true={msg.isInsightType}>
                                <div class="msg-text">
                                    <lightning-formatted-rich-text value={msg.text}></lightning-formatted-rich-text>
                                </div>
                                <template if:true={msg.hasInsightData}>
                                    <div class="insight-bar">
                                        <span class="insight-label">Margin Health</span>
                                        <div class="insight-meter">
                                            <div class="insight-fill" style={msg.data.marginPercent}></div>
                                        </div>
                                        <span class="insight-value">{msg.data.approvalLikelihood}</span>
                                    </div>
                                </template>
                            </template>

                            <!-- ── Disambiguation Messages ── -->
                            <template if:true={msg.isDisambiguationType}>
                                <div class="msg-text">
                                    <lightning-formatted-rich-text value={msg.text}></lightning-formatted-rich-text>
                                </div>
                                <template if:true={msg.hasOptions}>
                                    <div class="disambiguation-search">
                                        <span class="dis-search-icon">🔍</span>
                                        <input type="text"
                                               class="dis-search-input"
                                               placeholder="Search options..."
                                               data-msgid={msg.id}
                                               oninput={handleDisambiguationSearch} />
                                    </div>
                                    <div class="options-list">
                                        <template for:each={msg.displayedOptions} for:item="option">
                                            <button key={option.id}
                                                    class="option-card"
                                                    data-id={option.id}
                                                    data-type={option.type}
                                                    data-name={option.name}
                                                    data-accountid={option.accountId}
                                                    onclick={handleOptionSelect}>
                                                <span class="option-icon">{option.icon}</span>
                                                <div class="option-info">
                                                    <span class="option-name">{option.name}</span>
                                                    <span class="option-detail">{option.detail}</span>
                                                </div>
                                                <span class="option-arrow">→</span>
                                            </button>
                                        </template>
                                    </div>
                                </template>
                            </template>

                            <!-- Timestamp -->
                            <div class="msg-time">{msg.timestamp}</div>
                        </div>
                    </div>
                </template>

                <!-- Typing indicator -->
                <template if:true={isTyping}>
                    <div class="message assistant-message typing-msg">
                        <div class="avatar ai-avatar">✦</div>
                        <div class="msg-content">
                            <div class="typing-indicator">
                                <span class="dot"></span>
                                <span class="dot"></span>
                                <span class="dot"></span>
                            </div>
                        </div>
                    </div>
                </template>

                <div class="flex-spacer"></div>

                <!-- Suggested Actions -->
                <div class="suggested-section">
                    <h4 class="suggested-title">SUGGESTED</h4>
                    <div class="suggested-list">
                        <button class="suggested-item" data-prompt="Update Quote Items" onclick={handleQuickAction}>
                            <span class="sug-icon">✏️</span> Update Quote Items
                        </button>
                        <button class="suggested-item" data-prompt="Manage Discounts" onclick={handleQuickAction}>
                            <span class="sug-icon">%</span> Manage Discounts
                        </button>
                        <button class="suggested-item" data-prompt="Clone Quote" onclick={handleQuickAction}>
                            <span class="sug-icon">📋</span> Clone Quote
                        </button>
                        <button class="suggested-item" data-prompt="More options" onclick={handleQuickAction}>
                            <span class="sug-icon">⋯</span> More options
                        </button>
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="chat-footer">
                <p class="disclaimer">Powered by AI. May make mistakes.</p>
                <div class="input-wrap">
                    <input type="text"
                           class="chat-input"
                           placeholder="How can I help you today?"
                           value={inputValue}
                           oninput={handleInputChange}
                           onkeyup={handleKeyDown}>
                    <div class="input-actions">
                        <div class="context-chip">
                            <span class="chip-icon">📎</span> Quote {contextBadge}
                        </div>
                        <button class="send-btn" onclick={handleSend} title="Send">
                            <span class="send-arrow">↑</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>
</template>
