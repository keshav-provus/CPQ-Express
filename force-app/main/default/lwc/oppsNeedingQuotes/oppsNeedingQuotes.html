<template>
    <lightning-card title="Opportunities Needing Quotes" icon-name="standard:opportunity">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Creating Quote..." size="medium"></lightning-spinner>
        </template>
        <div class="slds-m-around_medium">
            <template if:true={opportunities}>
                <lightning-datatable
                    key-field="Id"
                    data={opportunities}
                    columns={columns}
                    hide-checkbox-column
                    onrowaction={handleRowAction}>
                </lightning-datatable>
            </template>
            <template if:false={opportunities}>
                <p class="slds-text-align_center">All opportunities have quotes. Great job!</p>
            </template>
            <template if:true={error}>
                <p class="slds-text-color_error">Error: {error}</p>
            </template>
        </div>
    </lightning-card>
</template>
