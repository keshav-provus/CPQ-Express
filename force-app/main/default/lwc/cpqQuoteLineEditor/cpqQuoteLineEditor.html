<template>
    <div class="editor-card">
        <div class="card-header">
            <h2 class="card-title">Quote Line Editor</h2>
            <div class="header-actions">
                <input type="file" 
                       accept=".csv" 
                       class="slds-hide" 
                       onchange={handleFileChange}
                       lwc:ref="fileInput"/>
                <button class="secondary-btn" onclick={triggerFileInput}>Import CSV</button>
                <button class="primary-btn" onclick={handleAddProducts}>
                    <lightning-icon icon-name="utility:add" size="xx-small" class="btn-icon"></lightning-icon>
                    Add Products
                </button>
            </div>
        </div>

        <div class="table-container">
            <table class="quote-table">
                <thead>
                    <tr>
                        <th class="th-product">PRODUCT</th>
                        <th class="th-qty text-center">QUANTITY</th>
                        <th class="th-price text-right">UNIT PRICE</th>
                        <th class="th-discount text-center">DISCOUNT %</th>
                        <th class="th-total text-right">TOTAL</th>
                        <th class="th-actions"></th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={lineItems} for:item="item">
                        <tr key={item.Id} class="item-row">
                            <td class="td-product">
                                <p class="p-name">{item.productName}</p>
                                <p class="p-sku">SKU: {item.productSKU}</p>
                            </td>
                            <td class="td-qty text-center">
                                <input type="number" 
                                       class="qty-input" 
                                       value={item.Quantity__c} 
                                       data-id={item.Id}
                                       data-field="Quantity__c"
                                       onchange={handleInputChange}/>
                            </td>
                            <td class="td-price text-right">{item.formattedPrice}</td>
                            <td class="td-discount text-center">
                                <input type="number" 
                                       class="discount-input" 
                                       value={item.Discount_Percent__c} 
                                       data-id={item.Id}
                                       data-field="Discount_Percent__c"
                                       onchange={handleInputChange}/>
                            </td>
                            <td class="td-total text-right font-bold">{item.formattedTotal}</td>
                            <td class="td-actions">
                                <button class="delete-btn" onclick={handleDeleteItem} data-id={item.Id}>
                                    <lightning-icon icon-name="utility:delete" size="xx-small" class="icon-delete"></lightning-icon>
                                </button>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <template if:false={hasLines}>
            <div class="empty-state">
                <p>No products added to this quote yet.</p>
            </div>
        </template>
        
        <div class="footer-actions" if:true={hasChanges}>
             <button class="save-btn" onclick={handleSave}>Save Changes</button>
        </div>

        <!-- Product Selector Popup -->
        <template if:true={showSelector}>
            <c-product-selector-popup 
                record-id={recordId}
                onclose={handleCloseSelector}
                onproductsadded={handleProductsAdded}>
            </c-product-selector-popup>
        </template>
    </div>
</template>
