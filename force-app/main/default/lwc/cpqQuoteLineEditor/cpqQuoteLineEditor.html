<template>
    <div class="line-items-tab">
        <div class="line-items-toolbar">
            <button class="btn" onclick={handleCollapseAll}>⊟ Collapse All</button>
            <button class="btn" onclick={handleAddPhase}>+ Add Phase</button>
            <button class="btn btn-primary" data-phase="Default" onclick={handleOpenWizard}>+ Add Item</button>
        </div>
        <div class="line-items-table-wrap">
            <table class="li-table">
                <thead>
                    <tr>
                        <th style="width:30px;"></th>
                        <th style="width:220px;">Name</th>
                        <th style="width:120px;">Task</th>
                        <th style="width:100px;">Start Date</th>
                        <th style="width:100px;">End Date</th>
                        <th style="width:80px;">Quantity</th>
                        <th style="width:90px;">Base Rate</th>
                        <th style="width:90px;">Unit Price</th>
                        <th style="width:80px;">Discount %</th>
                        <th style="width:100px;">Total Price</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={groupedPhases} for:item="phase">
                        <tr key={phase.name} class="phase-row">
                            <td colspan="10">
                                <span class="phase-toggle" data-phase={phase.name} onclick={togglePhase}>{phase.toggleIcon}</span>
                                {phase.name} &nbsp;
                                <a class="add-item-link" data-phase={phase.name} onclick={handleOpenWizard}>+ ADD ITEM</a>
                            </td>
                        </tr>
                        <template if:false={phase.isCollapsed}>
                            <template for:each={phase.items} for:item="item">
                                <tr key={item.Id} data-id={item.Id}>
                                    <td>{item.icon}</td>
                                    <td><a class="li-link">{item.Name}</a></td>
                                    <td><span class="add-task-link" data-msg="Task assignment will be implemented soon" onclick={handleToast}>Add task...</span></td>
                                    <td>{item.startDateFormatted}</td>
                                    <td>{item.endDateFormatted}</td>
                                    <td class="editable-cell">
                                        <input type="number" value={item.Quantity__c} min="0" step="0.5" data-id={item.Id} data-field="Quantity__c" onchange={handleUpdateItem}>
                                    </td>
                                    <td>{item.formattedBaseRate}</td>
                                    <td><a class="li-link">{item.formattedUnitPrice}</a></td>
                                    <td class="editable-cell">
                                        <input type="number" value={item.Discount_Percent__c} min="0" max="100" data-id={item.Id} data-field="Discount_Percent__c" onchange={handleUpdateItem}>%
                                    </td>
                                    <td><a class="li-link">{item.formattedNetTotal}</a></td>
                                </tr>
                            </template>
                        </template>
                    </template>
                    <tr class="total-row">
                        <td colspan="9" style="text-align:right;">Total</td>
                        <td>{grandTotal}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</template>
