<template>
    <div class="editor-container">
        <!-- Toolbar -->
        <div class="toolbar">
            <div class="btn-group">
                <button class="btn btn-icon" title="Collapse All">
                    <span class="icon">⬩</span>
                </button>
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" onclick={handleAddPhase}>Add Phase</button>
                <button class="btn btn-primary" onclick={handleSaveAll}>Save All Changes</button>
            </div>
        </div>

        <!-- Grouped Table -->
        <div class="table-wrapper">
            <template for:each={groupedPhases} for:item="phase">
                <div key={phase.name} class="phase-group">
                    <div class="phase-header">
                        <div class="phase-title">
                            <span class="chevron">▼</span>
                            <h3>{phase.name}</h3>
                            <span class="badge">{phase.itemCount} Items</span>
                        </div>
                        <div class="phase-actions">
                            <button class="btn btn-text" onclick={handleOpenWizard} data-phase={phase.name}>+ Add Item</button>
                        </div>
                    </div>

                    <div class="phase-content">
                        <table class="grid-table">
                            <thead>
                                <tr>
                                    <th class="cell-icon"></th>
                                    <th class="cell-name">Item Name</th>
                                    <th class="cell-task">Task</th>
                                    <th class="cell-date">Start Date</th>
                                    <th class="cell-date">End Date</th>
                                    <th class="cell-qty">Qty</th>
                                    <th class="cell-rate">Base Rate</th>
                                    <th class="cell-price">Unit Price</th>
                                    <th class="cell-disc">Disc %</th>
                                    <th class="cell-total">Total Price</th>
                                    <th class="cell-actions"></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={phase.items} for:item="item">
                                    <tr key={item.Id} class="row">
                                        <td class="cell-icon"><span class="icon-sm">📦</span></td>
                                        <td class="cell-name">{item.Product__r.Name}</td>
                                        <td class="cell-task">
                                            <input type="text" class="input-text" placeholder="Add task..."/>
                                        </td>
                                        <td class="cell-date">--</td>
                                        <td class="cell-date">--</td>
                                        <td class="cell-qty">
                                            <input type="number" class="input-number" value={item.Quantity__c} 
                                                   onchange={handleQtyChange} data-id={item.Id}/>
                                        </td>
                                        <td class="cell-rate">--</td>
                                        <td class="cell-price"><lightning-formatted-number value={item.Unit_Price__c} format-style="currency"></lightning-formatted-number></td>
                                        <td class="cell-disc">
                                            <input type="number" class="input-number" value={item.Discount_Percent__c} 
                                                   onchange={handleDiscountChange} data-id={item.Id}/>
                                        </td>
                                        <td class="cell-total"><lightning-formatted-number value={item.Net_Total__c} format-style="currency"></lightning-formatted-number></td>
                                        <td class="cell-actions">
                                            <button class="btn btn-icon-sm" onclick={handleDeleteItem} data-id={item.Id}>🗑️</button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>
            </template>
        </div>
    </div>
</template>
