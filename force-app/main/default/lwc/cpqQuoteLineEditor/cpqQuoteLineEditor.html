<template>
    <div class="line-items-tab">
        <div class="line-items-toolbar">
            <button class="btn" onclick={handleCollapseAll}>▸ Collapse All</button>
            <button class="btn" onclick={handleAddPhase}>+ Add Phase</button>
            <button class={undoBtnClass} onclick={handleUndo} disabled={isUndoDisabled}>↺ Undo</button>
            <button class="btn btn-primary" data-phase="" onclick={handleOpenWizard}>+ Add Item</button>
            <template if:true={hasSelected}>
                <button class="btn btn-danger" onclick={handleDeleteSelected}>🗑 Delete Selected</button>
            </template>
        </div>
        <div class="line-items-table-wrap"
             ondragover={handleDragOver}
             ondrop={handleDropToRoot}>
            <table class="li-table">
                <thead>
                    <tr>
                        <th style="width:36px;"><input type="checkbox" onchange={toggleSelectAll}></th>
                        <th style="width:28px;"></th>
                        <th style="width:28px;"></th>
                        <th style="width:200px;">Name</th>
                        <th style="width:130px;">Task</th>
                        <th style="width:110px;">Start Date</th>
                        <th style="width:110px;">End Date</th>
                        <th style="width:110px;">Quantity</th>
                        <th style="width:90px;">Base Rate</th>
                        <th style="width:110px;">Unit Price</th>
                        <th style="width:90px;">Discount %</th>
                        <th style="width:110px;">Total Price</th>
                    </tr>
                </thead>
                <tbody>
                    <template for:each={flatRows} for:item="row">
                        <!-- Phase header row -->
                        <template if:true={row.isPhase}>
                            <tr key={row.key} class="phase-row"
                                data-phase={row.name}
                                ondragover={handleDragOver}
                                ondragleave={handleDragLeave}
                                ondrop={handlePhaseDrop}>
                                <td></td>
                                <td>
                                    <span class="drag-handle phase-drag"
                                          draggable="true"
                                          data-phase={row.name}
                                          ondragstart={handleDragStart}>⠿</span>
                                </td>
                                <td>
                                    <lightning-icon icon-name={row.toggleIcon} size="xx-small" class="phase-toggle slds-m-right_xx-small" data-phase={row.name} onclick={togglePhase}></lightning-icon>
                                </td>
                                <td colspan="2" class="phase-cell-td">
                                    <template if:false={row.isEditing}>
                                        <strong class="phase-label" data-phase={row.name} ondblclick={handlePhaseNameDblClick}>{row.name}</strong>
                                    </template>
                                    <template if:true={row.isEditing}>
                                        <input type="text" class="phase-name-input"
                                               value={row.editValue}
                                               onchange={handlePhaseNameChange}
                                               onblur={handlePhaseNameBlur}
                                               onkeydown={handlePhaseNameKeyDown}>
                                    </template>
                                    &nbsp;
                                    <a class="add-item-link" data-phase={row.name} onclick={handleOpenWizard}>+ ADD ITEM</a>
                                    <span class="phase-item-count">({row.itemCount})</span>
                                </td>
                                <td class="editable-cell phase-date-cell">
                                    <input type="date"
                                           data-phase={row.name}
                                           data-field="startDate"
                                           value={row.startDate}
                                           onchange={handlePhaseDetailChange}>
                                </td>
                                <td class="editable-cell phase-date-cell">
                                    <input type="date"
                                           data-phase={row.name}
                                           data-field="endDate"
                                           value={row.endDate}
                                           onchange={handlePhaseDetailChange}>
                                </td>
                                <td colspan="4"></td>
                                <td style="text-align: right;">
                                    <button class="btn-icon delete-phase-btn" data-phase={row.name} onclick={handleDeletePhase} title="Delete Phase and its items">🗑</button>
                                </td>
                            </tr>
                        </template>

                        <!-- Line item row -->
                        <template if:false={row.isPhase}>
                            <tr key={row.key} class={row.rowClass}
                                draggable="true"
                                data-id={row.Id}
                                data-phase={row.phase}
                                ondragstart={handleDragStart}
                                ondragover={handleDragOver}
                                ondragleave={handleDragLeave}
                                ondrop={handleDrop}>
                                <td>
                                    <input type="checkbox"
                                           data-id={row.Id}
                                           checked={row.isSelected}
                                           onchange={toggleSelect}>
                                </td>
                                <td>
                                    <span class="drag-handle" data-id={row.Id}>⠿</span>
                                </td>
                                <td class="type-icon-cell">
                                    <span class={row.iconClass} title={row.Item_Type__c}>{row.icon}</span>
                                </td>
                                <td>
                                    <template if:true={row.isIndented}>
                                        <span class="indent-spacer"></span>
                                    </template>
                                    <span class="item-name">{row.displayName}</span>
                                    <span class="info-icon" title="View details">ⓘ</span>
                                </td>
                                <td>
                                    <span class="add-task-link" data-msg="Task assignment will be implemented soon" onclick={handleToast}>Add task...</span>
                                    <span class="info-icon" title="Task info">ⓘ</span>
                                </td>
                                <td>{row.startDateFormatted}</td>
                                <td>{row.endDateFormatted}</td>
                                <td class="editable-cell">
                                    <input type="number" value={row.Quantity__c} min="0" step="0.5"
                                           data-id={row.Id} data-field="Quantity__c"
                                           onchange={handleUpdateItem}>
                                    <span class="qty-unit">{row.qtyUnit}</span>
                                </td>
                                <td class="money">{row.formattedBaseRate}</td>
                                <td class="money link-price">{row.formattedUnitPrice}</td>
                                <td class="editable-cell">
                                    <input type="number" value={row.Discount_Percent__c} min="0" max="100"
                                           data-id={row.Id} data-field="Discount_Percent__c"
                                           onchange={handleUpdateItem}>
                                    <span class="pct-symbol">%</span>
                                </td>
                                <td class="money total-price">{row.formattedNetTotal}</td>
                            </tr>
                        </template>
                    </template>

                    <!-- Total row -->
                    <tr class="total-row">
                        <td colspan="11" style="text-align:right; font-weight:700;">Total</td>
                        <td class="money total-price" style="font-weight:700;">{grandTotal}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</template>
