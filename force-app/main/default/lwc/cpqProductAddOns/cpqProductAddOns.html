<template>
    <div class="space-y-6">
        <div class="flex items-center justify-between">
            <h3 class="font-headline font-bold text-lg text-on-surface">Product Add-Ons</h3>
            <button onclick={handleAddAddOn} class="flex items-center gap-2 px-4 py-2 bg-primary text-white rounded-lg font-bold text-xs uppercase tracking-wider hover:bg-primary-container transition-all shadow-md shadow-indigo-100">
                <span class="material-symbols-outlined text-sm">add</span>
                Add Add-On
            </button>
        </div>
        <div class="bg-surface-container-low p-1 rounded-xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-1">
                    <thead>
                        <tr class="text-[10px] font-bold text-outline uppercase tracking-widest">
                            <th class="px-6 py-4">Name</th>
                            <th class="px-6 py-4 text-right">Unit Price</th>
                        </tr>
                    </thead>
                    <tbody class="text-xs">
                        <template if:true={hasAddOns}>
                            <template for:each={addOns} for:item="addon">
                                <tr key={addon.Id} class="bg-surface-container-lowest hover:bg-surface-container-high transition-colors">
                                    <td class="px-6 py-4 font-bold text-on-surface">{addon.displayName}</td>
                                    <td class="px-6 py-4 text-right font-bold text-on-surface">{addon.formattedPrice}</td>
                                </tr>
                            </template>
                        </template>
                        <template if:false={hasAddOns}>
                            <tr class="bg-surface-container-lowest">
                                <td colspan="2" class="px-6 py-4 text-center text-on-surface-variant">No add-ons found.</td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <template if:true={isModalOpen}>
            <c-cpq-product-add-on-modal record-id={recordId} onclose={handleCloseModal} onsuccess={handleSaveSuccess}></c-cpq-product-add-on-modal>
        </template>
    </div>
</template>
