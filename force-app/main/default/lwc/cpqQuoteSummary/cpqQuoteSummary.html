<template>
    <div class="summary-tab">
        <div class="left-col">
            <!-- Details card -->
            <div class="card">
                <div class="detail-grid">
                    <div class="detail-item"><label>Opportunity</label><div class="val">{opportunityName}</div></div>
                    <div class="detail-item"><label>Account</label><div class="val"><a href="#">{accountName}</a></div></div>
                    <div class="detail-item"><label>Valid Until</label><div class="val">{validUntil}</div></div>
                    <div class="detail-item"><label>Quote Time Period</label><div class="val">{timePeriod}</div></div>
                    <div class="detail-item"><label>Created Date</label><div class="val">{createdDate}</div></div>
                    <div class="detail-item"><label>Created By</label><div class="val">{createdByName}</div></div>
                    <div class="detail-item last-modified" style="grid-column: 1 / -1;"><label>Last Modified By</label><div class="val">{lastModifiedByName}</div></div>
                </div>
            </div>

            <!-- Revenue cards -->
            <div class="revenue-row">
                <div class="rev-card">
                    <div class="rev-header">
                        <span class="rev-label">👤 Labor Revenue</span>
                        <span class="rev-pct">↗ {laborPercentage}%</span>
                    </div>
                    <div class="rev-amount"><lightning-formatted-number value={laborRevenue} format-style="currency"></lightning-formatted-number></div>
                    <div class="rev-meta">
                        Cost: <lightning-formatted-number value={laborCost} format-style="currency"></lightning-formatted-number> •
                        Margin: <lightning-formatted-number value={laborMargin} format-style="currency"></lightning-formatted-number>
                    </div>
                    <div class="rev-sub">{laborCountLabel}</div>
                </div>
                <div class="rev-card">
                    <div class="rev-header">
                        <span class="rev-label">📦 {productPlural} Revenue</span>
                        <span class="rev-pct">↘ {productPercentage}%</span>
                    </div>
                    <div class="rev-amount"><lightning-formatted-number value={productRevenue} format-style="currency"></lightning-formatted-number></div>
                    <div class="rev-meta">
                        Cost: <lightning-formatted-number value={productCost} format-style="currency"></lightning-formatted-number> •
                        Margin: <lightning-formatted-number value={productMargin} format-style="currency"></lightning-formatted-number>
                    </div>
                    <div class="rev-sub">{productCountLabel}</div>
                </div>
                <div class="rev-card">
                    <div class="rev-header">
                        <span class="rev-label">➕ {addOnPlural} Revenue</span>
                        <span class="rev-pct">↘ {addonPercentage}%</span>
                    </div>
                    <div class="rev-amount"><lightning-formatted-number value={addonRevenue} format-style="currency"></lightning-formatted-number></div>
                    <div class="rev-meta">
                        Cost: <lightning-formatted-number value={addonCost} format-style="currency"></lightning-formatted-number> •
                        Margin: <lightning-formatted-number value={addonMargin} format-style="currency"></lightning-formatted-number>
                    </div>
                    <div class="rev-sub">{addonCountLabel}</div>
                </div>
            </div>

            <!-- Charts -->
            <div class="charts-row">
                <div class="chart-card">
                    <h4>Item Type Breakdown</h4>
                    <div class="chart-sub">Cost and margin distribution by item type</div>
                    <div class="bar-chart">
                        <div class="bar-group">
                            <div class="bars">
                                <div class="bar cost" style={laborCostStyle}></div>
                                <div class="bar margin" style={laborMarginStyle}></div>
                            </div>
                            <div class="bar-label">Labor</div>
                        </div>
                        <div class="bar-group">
                            <div class="bars">
                                <div class="bar cost" style={productCostStyle}></div>
                                <div class="bar margin" style={productMarginStyle}></div>
                            </div>
                            <div class="bar-label">{productPlural}</div>
                        </div>
                        <div class="bar-group">
                            <div class="bars">
                                <div class="bar cost" style={addonCostStyle}></div>
                                <div class="bar margin" style={addonMarginStyle}></div>
                            </div>
                            <div class="bar-label">{addOnPlural}</div>
                        </div>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-item"><div class="legend-dot" style="background:#93c5fd;"></div>Cost</div>
                        <div class="legend-item"><div class="legend-dot" style="background:#2563eb;"></div>Margin</div>
                    </div>
                </div>
                <div class="chart-card">
                    <h4>Phase Breakdown</h4>
                    <div class="chart-sub">Cost and margin distribution by project phase</div>
                    <div class="bar-chart">
                        <template for:each={phaseChartData} for:item="bar">
                            <div key={bar.label} class="bar-group">
                                <div class="bars">
                                    <div class="bar cost" style={bar.costStyle}></div>
                                    <div class="bar margin" style={bar.marginStyle}></div>
                                </div>
                                <div class="bar-label">{bar.label}</div>
                            </div>
                        </template>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-item"><div class="legend-dot" style="background:#93c5fd;"></div>Cost</div>
                        <div class="legend-item"><div class="legend-dot" style="background:#2563eb;"></div>Margin</div>
                    </div>
                </div>
            </div>

            <!-- Phase table -->
            <div class="phase-table">
                <table>
                    <thead>
                        <tr>
                            <th>Phase</th><th>Labor</th><th>{productPlural}</th><th>{addOnPlural}</th><th>Total</th><th>Items</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template if:true={hasPhases}>
                            <template for:each={phaseRows} for:item="row">
                                <tr key={row.phase}>
                                    <td>{row.phase}</td>
                                    <td class="link"><lightning-formatted-number value={row.labor} format-style="currency"></lightning-formatted-number></td>
                                    <td class="link"><lightning-formatted-number value={row.products} format-style="currency"></lightning-formatted-number></td>
                                    <td class="link"><lightning-formatted-number value={row.addons} format-style="currency"></lightning-formatted-number></td>
                                    <td><lightning-formatted-number value={row.total} format-style="currency"></lightning-formatted-number></td>
                                    <td>{row.items}</td>
                                </tr>
                            </template>
                        </template>
                        <template if:false={hasPhases}>
                            <tr><td colspan="6" style="text-align:center; padding:20px; color:#9ca3af;">No line items added yet.</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right column -->
        <div class="right-col">
            <div class="approval-card">
                <h3>Approval History</h3>
                <p class="sub">Track the approval process for this quote.</p>
                <div class="approval-empty">
                    <div class="icon">📄</div>
                    <p>No approval history yet.<br>Submit this quote for approval to see the approval process.</p>
                </div>
            </div>
            <div class="cost-audit">
                <h3>Cost Change Audit</h3>
                <p class="sub">Track cost changes for line items in this quote.</p>
                <div class="history-row" onclick={toggleAuditHistory}>
                    <span class="history-label">History (0)</span>
                    <span class="history-caret">▾</span>
                </div>
                <template if:true={showAuditHistory}>
                    <div class="audit-empty">
                        <p>No cost changes recorded yet.</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
