<template>
    <div class="summary-container">
        <!-- Revenue Cards -->
        <div class="cards-row">
            <div class="revenue-card">
                <div class="card-header">
                    <span class="dot labor"></span>
                    <label>Labor</label>
                </div>
                <div class="card-body">
                    <div class="value"><lightning-formatted-number value={laborTotal} format-style="currency"></lightning-formatted-number></div>
                    <div class="trend up">↗ 12%</div>
                </div>
            </div>
            <div class="revenue-card">
                <div class="card-header">
                    <span class="dot products"></span>
                    <label>Products</label>
                </div>
                <div class="card-body">
                    <div class="value"><lightning-formatted-number value={productTotal} format-style="currency"></lightning-formatted-number></div>
                    <div class="trend up">↗ 5%</div>
                </div>
            </div>
            <div class="revenue-card">
                <div class="card-header">
                    <span class="dot addons"></span>
                    <label>Add-ons</label>
                </div>
                <div class="card-body">
                    <div class="value"><lightning-formatted-number value={addonTotal} format-style="currency"></lightning-formatted-number></div>
                    <div class="trend down">↘ 2%</div>
                </div>
            </div>
        </div>

        <!-- Charts & Breakdown -->
        <div class="grid-layout">
            <div class="charts-section">
                <div class="chart-card">
                    <h3>Item Type Breakdown</h3>
                    <div class="bar-chart">
                        <div class="bar labor"></div>
                        <div class="bar products"></div>
                        <div class="bar addons"></div>
                    </div>
                    <div class="chart-legend">
                        <span>Labor</span>
                        <span>Products</span>
                        <span>Add-ons</span>
                    </div>
                </div>

                <div class="chart-card">
                    <h3>Phase Revenue</h3>
                    <div class="phase-bars">
                        <template for:each={phaseBreakdown} for:item="pb">
                            <div key={pb.name} class="phase-row">
                                <label>{pb.name}</label>
                                <div class="progress-bg">
                                    <div class="progress-fill"></div>
                                </div>
                                <span class="amt"><lightning-formatted-number value={pb.total} format-style="currency"></lightning-formatted-number></span>
                            </div>
                        </template>
                    </div>
                </div>
            </div>

            <div class="side-widgets">
                <div class="widget-card">
                    <h3>Approval History</h3>
                    <ul class="history-list">
                        <li>
                            <span class="bullet"></span>
                            <div class="item">
                                <p class="msg">Quote submitted for approval</p>
                                <span class="time">2 hours ago</span>
                            </div>
                        </li>
                        <li>
                            <span class="bullet gray"></span>
                            <div class="item">
                                <p class="msg">Initial draft created</p>
                                <span class="time">Yesterday</span>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</template>
