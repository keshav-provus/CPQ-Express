<template>
    <div class="summary-tab">
        <div class="left-col">
            <!-- Details card -->
            <div class="card details-card">
                <div class="card-header">
                    <h4 class="card-title">Quote Details</h4>
                </div>
                <div class="detail-grid">
                    <div class="detail-item"><label>Opportunity</label><div class="val"><a data-id={opportunityId} onclick={handleRecordNavigate}>{opportunityName}</a></div></div>
                    <div class="detail-item"><label>Account</label><div class="val"><a data-id={accountId} onclick={handleRecordNavigate}>{accountName}</a></div></div>
                    <div class="detail-item"><label>Valid Until</label><div class="val">{validUntil}</div></div>
                    <div class="detail-item"><label>Quote Time Period</label><div class="val">{timePeriod}</div></div>
                    <div class="detail-item"><label>Created Date</label><div class="val">{createdDate}</div></div>
                    <div class="detail-item"><label>Created By</label><div class="val">{createdByName}</div></div>
                    <div class="detail-item last-modified" style="grid-column: 1 / -1;"><label>Last Modified By</label><div class="val">{lastModifiedByName}</div></div>
                </div>
            </div>

            <!-- Revenue cards -->
            <div class="revenue-row">
                <div class="rev-card labor-card">
                    <div class="rev-accent"></div>
                    <div class="rev-body">
                        <div class="rev-header">
                            <span class="rev-label"><span class="rev-icon">👤</span> Labor Revenue</span>
                            <span class={laborMarginClass}>↗ {laborPercentage}%</span>
                        </div>
                        <div class="rev-amount"><lightning-formatted-number value={laborRevenue} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></div>
                        <div class="rev-meta">
                            Cost: <lightning-formatted-number value={laborCost} format-style="currency" currency-code={currencyCode}></lightning-formatted-number> •
                            Margin: <lightning-formatted-number value={laborMargin} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                        </div>
                        <div class="rev-sub">{laborCount} Resource Roles</div>
                    </div>
                </div>
                <div class="rev-card product-card">
                    <div class="rev-accent"></div>
                    <div class="rev-body">
                        <div class="rev-header">
                            <span class="rev-label"><span class="rev-icon">📦</span> Products Revenue</span>
                            <span class={productMarginClass}>↗ {productPercentage}%</span>
                        </div>
                        <div class="rev-amount"><lightning-formatted-number value={productRevenue} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></div>
                        <div class="rev-meta">
                            Cost: <lightning-formatted-number value={productCost} format-style="currency" currency-code={currencyCode}></lightning-formatted-number> •
                            Margin: <lightning-formatted-number value={productMargin} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                        </div>
                        <div class="rev-sub">{productCount} Products</div>
                    </div>
                </div>
                <div class="rev-card addon-card">
                    <div class="rev-accent"></div>
                    <div class="rev-body">
                        <div class="rev-header">
                            <span class="rev-label"><span class="rev-icon">➕</span> Add-ons Revenue</span>
                            <span class={addonMarginClass}>↗ {addonPercentage}%</span>
                        </div>
                        <div class="rev-amount"><lightning-formatted-number value={addonRevenue} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></div>
                        <div class="rev-meta">
                            Cost: <lightning-formatted-number value={addonCost} format-style="currency" currency-code={currencyCode}></lightning-formatted-number> •
                            Margin: <lightning-formatted-number value={addonMargin} format-style="currency" currency-code={currencyCode}></lightning-formatted-number>
                        </div>
                        <div class="rev-sub">{addonCount} Add-on Items</div>
                    </div>
                </div>
            </div>

            <!-- Interactive Charts -->
            <div class="charts-row">
                <div class="chart-card">
                    <div class="chart-header">
                        <h4>Item Type Breakdown</h4>
                        <span class="chart-sub">Cost and margin distribution by item type</span>
                    </div>
                    <div class="bar-chart">
                        <template for:each={itemTypeChartData} for:item="bar">
                            <div key={bar.key} class={bar.barGroupClass}
                                 data-bar={bar.key}
                                 onmouseenter={handleBarEnter}
                                 onmouseleave={handleBarLeave}
                                 onclick={handleBarClick}>
                                <div class="bars">
                                    <div class="bar cost" style={bar.costHeight}></div>
                                    <div class="bar margin" style={bar.marginHeight}></div>
                                </div>
                                <div class="bar-label">{bar.label}</div>
                                <template if:true={bar.isHovered}>
                                    <div class="bar-tooltip">
                                        <div class="tooltip-row"><span class="tooltip-label">Revenue:</span><span class="tooltip-val">{bar.revenueFormatted}</span></div>
                                        <div class="tooltip-row"><span class="tooltip-label">Cost:</span><span class="tooltip-val">{bar.costFormatted}</span></div>
                                        <div class="tooltip-row"><span class="tooltip-label">Margin:</span><span class="tooltip-val tooltip-margin">{bar.marginFormatted}</span></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-item"><div class="legend-dot cost-dot"></div>Cost</div>
                        <div class="legend-item"><div class="legend-dot margin-dot"></div>Margin</div>
                    </div>
                </div>
                <div class="chart-card">
                    <div class="chart-header">
                        <h4>Phase Breakdown</h4>
                        <span class="chart-sub">Cost and margin distribution by project phase</span>
                    </div>
                    <div class="bar-chart">
                        <template for:each={phaseChartData} for:item="bar">
                            <div key={bar.key} class={bar.barGroupClass}
                                 data-bar={bar.key}
                                 onmouseenter={handleBarEnter}
                                 onmouseleave={handleBarLeave}
                                 onclick={handleBarClick}>
                                <div class="bars">
                                    <div class="bar cost" style={bar.costHeight}></div>
                                    <div class="bar margin" style={bar.marginHeight}></div>
                                </div>
                                <div class="bar-label">{bar.label}</div>
                                <template if:true={bar.isHovered}>
                                    <div class="bar-tooltip">
                                        <div class="tooltip-row"><span class="tooltip-label">Total:</span><span class="tooltip-val">{bar.totalFormatted}</span></div>
                                        <div class="tooltip-row"><span class="tooltip-label">Cost:</span><span class="tooltip-val">{bar.costFormatted}</span></div>
                                        <div class="tooltip-row"><span class="tooltip-label">Margin:</span><span class="tooltip-val tooltip-margin">{bar.marginFormatted}</span></div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                    <div class="chart-legend">
                        <div class="legend-item"><div class="legend-dot cost-dot"></div>Cost</div>
                        <div class="legend-item"><div class="legend-dot margin-dot"></div>Margin</div>
                    </div>
                </div>
            </div>

            <!-- Phase table -->
            <div class="phase-table">
                <table>
                    <thead>
                        <tr>
                            <th>Phase</th><th>Labor</th><th>Products</th><th>Add-ons</th><th>Total</th><th>Items</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template if:true={hasPhases}>
                            <template for:each={phaseRows} for:item="row">
                                <tr key={row.phase}>
                                    <td class="phase-name-col">{row.phase}</td>
                                    <td class="link"><lightning-formatted-number value={row.labor} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></td>
                                    <td class="link"><lightning-formatted-number value={row.products} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></td>
                                    <td class="link"><lightning-formatted-number value={row.addons} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></td>
                                    <td class="total-col"><lightning-formatted-number value={row.total} format-style="currency" currency-code={currencyCode}></lightning-formatted-number></td>
                                    <td class="count-col">{row.items}</td>
                                </tr>
                            </template>
                        </template>
                        <template if:false={hasPhases}>
                            <tr><td colspan="6" class="empty-table-msg">No line items added yet.</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Right column -->
        <div class="right-col">
            <c-cpq-approval-history quote={quoteData}></c-cpq-approval-history>
            <div class="cost-audit">
                <div class="audit-header">
                    <h3>Cost Change Audit</h3>
                    <span class="audit-count">{auditCount} changes</span>
                </div>
                <p class="sub">Track field changes for line items in this quote.</p>
                <div class="history-row" onclick={toggleAuditHistory}>
                    <span class="history-label">{auditChevronIcon} History ({auditCount})</span>
                </div>
                <template if:true={showAuditHistory}>
                    <template if:true={hasAuditLogs}>
                        <div class="audit-timeline">
                            <template for:each={auditLogs} for:item="log">
                                <div key={log.id} class="audit-entry">
                                    <div class="audit-dot-wrap">
                                        <div class={log.iconClass}></div>
                                        <div class="audit-line"></div>
                                    </div>
                                    <div class="audit-content">
                                        <div class="audit-message">{log.message}</div>
                                        <div class="audit-meta">
                                            <span class="audit-user">{log.changedBy}</span>
                                            <span class="audit-sep">•</span>
                                            <span class="audit-time">{log.timeDisplay}</span>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasAuditLogs}>
                        <div class="audit-empty">
                            <span class="audit-empty-icon">📋</span>
                            <p>No cost changes recorded yet.</p>
                            <p class="audit-empty-sub">Changes to line item fields will appear here.</p>
                        </div>
                    </template>
                </template>
            </div>
        </div>
    </div>
</template>
