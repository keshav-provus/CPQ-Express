<template>
    <div class="space-y-8">
        <section class="flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div class="space-y-1">
                <div class="flex items-center gap-3">
                    <h1 class="text-3xl font-extrabold font-headline tracking-tight text-on-surface">{productName}</h1>
                    <span class={statusClass} style="text-transform: uppercase; font-size: 10px; padding: 4px 12px; border-radius: 9999px; font-weight: 700; display: flex; align-items: center; gap: 4px;">
                        <span class={statusDotClass}></span>
                        {status}
                    </span>
                </div>
                <p class="text-on-surface-variant text-sm font-medium">Product Code: <span class="font-bold text-on-surface">{productCode}</span> • {productType}</p>
            </div>
            <div class="flex items-center gap-3">
                <button class="px-6 py-2.5 bg-surface-container-high text-on-surface-variant font-bold text-xs rounded-xl hover:bg-surface-container-highest transition-colors active:scale-95">Edit</button>
                <button class="px-6 py-2.5 bg-primary text-white font-bold text-xs rounded-xl shadow-lg shadow-indigo-100 hover:bg-primary-container transition-colors active:scale-95">Configure Rules</button>
            </div>
        </section>

        <!-- KPI Metrics Cards -->
        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)] border border-transparent transition-all hover:translate-y-[-2px]">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-indigo-50 rounded-lg flex items-center justify-center">
                        <lightning-icon icon-name="utility:moneybag" size="small" variant="brand"></lightning-icon>
                    </div>
                    <span class="text-xs font-bold text-green-600 bg-green-50 px-2 py-0.5 rounded-full">+4.2%</span>
                </div>
                <p class="text-outline text-[10px] font-bold uppercase tracking-widest mb-1">Avg. Sales Price</p>
                <p class="text-2xl font-black font-headline text-on-surface"><lightning-formatted-number value={avgSalesPrice} format-style="currency"></lightning-formatted-number></p>
            </div>
            <div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)] border border-transparent transition-all hover:translate-y-[-2px]">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-purple-50 rounded-lg flex items-center justify-center">
                        <lightning-icon icon-name="utility:chart" size="small" class="purple-icon"></lightning-icon>
                    </div>
                    <span class="text-xs font-bold text-on-surface-variant bg-surface-container px-2 py-0.5 rounded-full">Benchmark</span>
                </div>
                <p class="text-outline text-[10px] font-bold uppercase tracking-widest mb-1">Margin %</p>
                <p class="text-2xl font-black font-headline text-on-surface">{marginPct}%</p>
            </div>
            <div class="bg-surface-container-lowest p-6 rounded-xl shadow-[0_12px_32px_rgba(25,28,30,0.06)] border border-transparent transition-all hover:translate-y-[-2px]">
                <div class="flex justify-between items-start mb-4">
                    <div class="p-2 bg-amber-50 rounded-lg flex items-center justify-center">
                        <lightning-icon icon-name="utility:tag" size="small" class="amber-icon"></lightning-icon>
                    </div>
                    <template if:false={isEditingDiscount}>
                        <button onclick={handleEditDiscount} class="p-1 hover:bg-surface-container-high rounded transition-colors group">
                             <lightning-icon icon-name="utility:edit" size="xx-small" class="text-outline group-hover:text-primary"></lightning-icon>
                        </button>
                    </template>
                </div>
                <p class="text-outline text-[10px] font-bold uppercase tracking-widest mb-1">Default Discount</p>
                <template if:false={isEditingDiscount}>
                    <p class="text-2xl font-black font-headline text-on-surface">{defaultDiscount}%</p>
                </template>
                <template if:true={isEditingDiscount}>
                    <div class="flex items-center gap-2 mt-1">
                        <input type="number" class="w-20 bg-surface-container-high border-none rounded-lg px-3 py-1 text-sm focus:ring-2 focus:ring-primary/40" value={editedDiscount} oninput={handleDiscountChange}>
                        <button onclick={handleSaveDiscount} class="p-1 hover:bg-green-50 rounded transition-colors">
                            <lightning-icon icon-name="utility:check" size="xx-small" variant="success"></lightning-icon>
                        </button>
                        <button onclick={handleCancelDiscount} class="p-1 hover:bg-red-50 rounded transition-colors">
                            <lightning-icon icon-name="utility:close" size="xx-small" variant="error"></lightning-icon>
                        </button>
                    </div>
                </template>
            </div>
        </section>
    </div>
</template>
