<template>
    <div class="margin-card">
        <h3 class="margin-title">Margin Threshold</h3>

        <template if:true={isLoading}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <div class="slider-wrap">
                <input
                    type="range"
                    class="margin-slider"
                    min="0"
                    max="50"
                    value={marginValue}
                    oninput={handleMarginInput}
                    onchange={handleMarginChange}
                />
                <div class="slider-labels">
                    <span class="slider-min">0%</span>
                    <span class="slider-target">Target: {marginDisplay}</span>
                    <span class="slider-max">50%</span>
                </div>
            </div>

            <div class="tier-badges">
                <span class="tier-badge tier-1">Tier 1</span>
                <span class="tier-badge tier-2">Tier 2</span>
                <span class="tier-badge tier-3">Tier 3</span>
            </div>
        </template>
    </div>
</template>
