<template>
    <div class="margin-card">
        <div class="margin-header">
            <div>
                <p class="margin-label">Global Margin Threshold</p>
                <p class="margin-subtitle">Automatic approval for quotes above this margin baseline.</p>
            </div>
            <span class="margin-value">{marginDisplay}</span>
        </div>

        <template if:true={isLoading}>
            <div class="loading-state">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <input
                type="range"
                class="margin-slider"
                min="0"
                max="50"
                value={marginValue}
                oninput={handleMarginInput}
                onchange={handleMarginChange}
            />

            <div class="slider-labels">
                <span>0% Floor (Full Review)</span>
                <span>50% Ceiling (Auto-Approve Peak)</span>
            </div>
        </template>
    </div>
</template>
