<template>
    <div class="app-container">
        <!-- Header / Highlight Panel -->
        <c-cpq-quote-header 
            record-id={recordId}
            quote-data={quoteData}
            line-items={lineItems}
            onrefresh={handleRefresh}>
        </c-cpq-quote-header>

        <!-- Main Content -->
        <div class="content-area">
            <div class="tabs">
                <div class={summaryTabClass} data-tab="summary" onclick={switchTab}>Summary</div>
                <div class={lineitemsTabClass} data-tab="lineitems" onclick={switchTab}>Line Items</div>
                <div class={timelineTabClass} data-tab="timeline" onclick={switchTab}>Timeline</div>
                <div class={pdfsTabClass} data-tab="pdfs" onclick={switchTab}>Generated PDFs</div>
            </div>

            <div class="tab-content">
                <template if:true={isSummary}>
                    <c-cpq-quote-summary 
                        record-id={recordId}
                        quote-data={quoteData}
                        line-items={lineItems}>
                    </c-cpq-quote-summary>
                </template>
                
                <template if:true={isLineItems}>
                    <c-cpq-quote-line-editor 
                        record-id={recordId}
                        quote-data={quoteData}
                        line-items={lineItems}
                        onrefresh={handleRefresh}
                        onopenwizard={handleOpenWizard}>
                    </c-cpq-quote-line-editor>
                </template>

                <template if:true={isTimeline}>
                    <div class="empty-state">
                        <div class="icon">📅</div>
                        <p>Timeline view will be implemented soon.</p>
                    </div>
                </template>

                <template if:true={isPdfs}>
                    <c-cpq-document-management
                        record-id={recordId}
                        quote-name={quoteData.Name}>
                    </c-cpq-document-management>
                </template>
            </div>
        </div>

        <!-- Right Side Wizard Panel -->
        <template if:true={isWizardOpen}>
            <c-cpq-add-items-wizard 
                record-id={recordId}
                target-phase={targetPhase}
                onclose={handleCloseWizard}
                onsuccess={handleWizardSuccess}>
            </c-cpq-add-items-wizard>
        </template>
    </div>
</template>
