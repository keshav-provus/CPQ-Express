<template>
    <div class="table-card">
        <div class="card-header">
            <div>
                <h2 class="card-title">Top Quotes</h2>
                <p class="card-subtitle">Approved quotes based on total value</p>
            </div>
            <a class="view-detail">View detail</a>
        </div>
        
        <table class="transaction-table">
            <thead>
                <tr>
                    <th>Quote ID</th>
                    <th>Account</th>
                    <th>Date</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody>
                <template if:true={transactions}>
                    <template for:each={formattedTransactions} for:item="tx">
                        <tr key={tx.Id}>
                            <td class="quote-id">{tx.Name}</td>
                            <td class="account-name">{tx.accountName}</td>
                            <td class="date-text">{tx.formattedDate}</td>
                            <td class="amount-text">{tx.formattedAmount}</td>
                        </tr>
                    </template>
                </template>
                <template if:false={transactions}>
                    <tr>
                        <td colspan="4" class="slds-text-align_center slds-p-around_medium">
                            <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
    </div>
</template>
