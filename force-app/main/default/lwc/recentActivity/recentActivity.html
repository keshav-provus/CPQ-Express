<template>
    <div class="card-wrapper">
        <h2 class="card-title">Recent Activity</h2>
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <template if:true={hasActivities}>
                <div class="timeline">
                    <template for:each={activities} for:item="item">
                        <div key={item.quoteId} class="timeline-item">
                            <div class="timeline-track">
                                <span class={item.dotClass}></span>
                                <span class="timeline-line"></span>
                            </div>
                            <div class="timeline-content">
                                <p class="activity-title">{item.title}</p>
                                <p class="activity-meta">{item.timeAgo} &bull; {item.accountName}</p>
                            </div>
                        </div>
                    </template>
                </div>
            </template>
            <template if:false={hasActivities}>
                <div class="empty-state">
                    <p class="slds-text-color_weak">No recent activity.</p>
                </div>
            </template>
        </template>
    </div>
</template>
