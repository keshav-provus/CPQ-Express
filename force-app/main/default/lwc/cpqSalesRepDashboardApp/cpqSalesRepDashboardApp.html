<template>
    <!-- Floating Action Button -->
    <button class="fab-button" onclick={handleStartQuote} title="New Quote">
        <lightning-icon icon-name="utility:add" size="medium" variant="inverse"></lightning-icon>
    </button>

    <div class="dashboard-shell">
        
        <!-- ─── Top Metrics Grid ─── -->
        <section class="metrics-grid">
            <!-- Quota -->
            <div class="metric-card">
                <div class="metric-label">Quarterly Quota</div>
                <div class="metric-value-row">
                    <span class="metric-value">{totalQuota}</span>
                    <span class="metric-badge green">
                        <lightning-icon icon-name="utility:trending" size="xx-small" variant="success"></lightning-icon>
                        {quotaPercentage}%
                    </span>
                </div>
                <div class="progress-track">
                    <div class="progress-fill" style={quotaBarStyle}></div>
                </div>
            </div>

            <!-- Revenue -->
            <div class="metric-card">
                <div class="metric-label">Booked Revenue</div>
                <div class="metric-value-row">
                    <span class="metric-value">{bookedRevenue}</span>
                    <span class="metric-subtext">+12.5% MoM</span>
                </div>
                <div style="margin-top: 0.75rem; display: flex; gap: 0.25rem;">
                    <!-- placeholders for avatars using badges -->
                    <span class="metric-badge" style="background:#e0e3e5; color:#434655;">+14</span>
                </div>
            </div>

            <!-- Pending Approvals -->
            <div class="metric-card">
                <div class="metric-label">Pending Approvals</div>
                <div class="metric-value-row">
                    <span class="metric-value">{pendingApprovalsCount}</span>
                    <span class="metric-badge red">
                        <lightning-icon icon-name="utility:clock" size="xx-small" variant="error"></lightning-icon>
                        Priority
                    </span>
                </div>
                <div class="metric-subtext">Avg. turnaround: 4.2 hours</div>
            </div>

            <!-- Active Quotes -->
            <div class="metric-card">
                <div class="metric-label">Active Quotes</div>
                <div class="metric-value-row">
                    <span class="metric-value">{activeQuotesCount}</span>
                    <lightning-icon icon-name="utility:file" size="small"></lightning-icon>
                </div>
                <div class="metric-subtext">Total pipeline value: {pipelineValue}</div>
            </div>
        </section>

        <!-- ─── Middle Section Grid ─── -->
        <section class="middle-grid">
            
            <div class="left-col">
                <!-- My Quotes Panel -->
                <div class="panel">
                    <div class="panel-header">
                        <h2 class="panel-title">My Quotes</h2>
                        <button class="panel-action">View All Quotes</button>
                    </div>
                    <div class="quotes-table-container">
                        <table class="quotes-table">
                            <thead>
                                <tr>
                                    <th>Project Name</th>
                                    <th>Client</th>
                                    <th>Value</th>
                                    <th>Status</th>
                                    <th style="text-align:right;">Action</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={recentQuotes} for:item="quote">
                                    <tr key={quote.id}>
                                        <td class="td-project">
                                            <span class="project-name">{quote.name}</span>
                                            <span class="project-sub">{quote.subtitle}</span>
                                        </td>
                                        <td class="td-client">{quote.client}</td>
                                        <td class="td-value">{quote.value}</td>
                                        <td>
                                            <span class={quote.badgeClass}>{quote.status}</span>
                                        </td>
                                        <td style="text-align:right;">
                                            <button class="action-btn" data-id={quote.id} onclick={handleActionClick}>
                                                <lightning-icon icon-name={quote.iconName} size="x-small"></lightning-icon>
                                            </button>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- ─── Bottom Section Grid ─── -->
                <section class="bottom-grid">
                    
                    <!-- Catalog Discounts -->
                    <div class="panel" style="padding: 1rem;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                            <div>
                                <h2 class="panel-title">Catalog Discounts</h2>
                                <div class="metric-subtext" style="margin-top:0.25rem;">Active manufacturer rebates &amp; seasonal pricing</div>
                            </div>
                            <lightning-icon icon-name="utility:pricetags" size="small"></lightning-icon>
                        </div>
                        
                        
                        <template for:each={catalogDiscounts} for:item="cd">
                            <div class="catalog-item" key={cd.id}>
                                <div class="catalog-item-icon">
                                    <lightning-icon icon-name={cd.icon} size="x-small" variant="success"></lightning-icon>
                                </div>
                                <div class="catalog-item-text">
                                    <div class="catalog-item-title">{cd.title}</div>
                                    <div class="catalog-item-sub">{cd.text}</div>
                                </div>
                                <div class="catalog-item-val">{cd.val}</div>
                            </div>
                        </template>
                    </div>

                    <!-- Product Feed -->
                    <div class="panel" style="padding: 1rem;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem;">
                            <div>
                                <h2 class="panel-title">Product Feed</h2>
                                <div class="metric-subtext" style="margin-top:0.25rem;">Latest updates from engineering &amp; inventory</div>
                            </div>
                            <lightning-icon icon-name="utility:rss" size="small"></lightning-icon>
                        </div>

                        
                        <template for:each={productFeeds} for:item="pf">
                            <div class="feed-item" key={pf.id}>
                                <lightning-icon icon-name={pf.icon} size="medium" style="background:#e0e3e5; padding:0.5rem; border-radius:0.5rem; margin-right:1rem;"></lightning-icon>
                                <div>
                                    <div class={pf.tagClass}>{pf.tag}</div>
                                    <div class="feed-title">{pf.title}</div>
                                    <div class="feed-desc">{pf.desc}</div>
                                </div>
                            </div>
                        </template>
                    </div>
</section>
            </div>

            <!-- AI Assistant Panel -->
            <div class="ai-panel">
                <div class="ai-header">
                    <div class="ai-header-icon">
                        <lightning-icon icon-name="utility:magicwand" size="small" variant="inverse"></lightning-icon>
                    </div>
                    <h2 class="panel-title" style="margin: 0;">AI Assistant</h2>
                </div>
                
                <div class="ai-alert-card">
                    <div class="ai-alert-label">Opportunity Alert</div>
                    <div class="ai-alert-text">
                        "The Meridian Lofts" quote is 15% lower than typical regional pricing. Recommend increasing glazing margin by 3%.
                    </div>
                </div>

                <div class="ai-alert-card">
                    <div class="ai-alert-label">Workflow Suggestion</div>
                    <div class="ai-alert-text" style="margin-bottom:0.5rem;">
                        You have 4 quotes expiring in 48 hours. Start renewal sequence for 'Vantage Towers'?
                    </div>
                    <button class="ai-action-btn">Apply Strategy</button>
                </div>

                <div style="margin-top:auto;">
                    <lightning-input variant="label-hidden" placeholder="Ask AI anything..."></lightning-input>
                </div>
            </div>
            
        </section>

    </div>
</template>
