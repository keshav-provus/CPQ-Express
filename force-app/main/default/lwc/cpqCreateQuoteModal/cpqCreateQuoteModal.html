<template>
    <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_small">
        <div class="slds-modal__container">
            <!-- Modal Header -->
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCancel}>
                    <lightning-icon icon-name="utility:close" size="small" variant="inverse"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 class="slds-text-heading_medium slds-hyphenate">Generate New Quote</h2>
            </header>

            <!-- Modal Body -->
            <div class="slds-modal__content slds-p-around_large" id="modal-content-id-1">
                <div class="slds-grid slds-wrap slds-gutters">
                    <!-- Quote Name -->
                    <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium">
                        <lightning-input label="Quote Name" 
                                         value={quoteName} 
                                         data-id="name" 
                                         onchange={handleInputChange} 
                                         required>
                        </lightning-input>
                    </div>

                    <!-- Row 1: Start Date and End Date -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                        <lightning-input type="date" 
                                         label="Quote Start Date" 
                                         value={startDate} 
                                         data-id="startDate" 
                                         onchange={handleInputChange} 
                                         required>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                        <div class="end-date-container">
                            <label class="slds-form-element__label">Quote End Date</label>
                            <div class="end-date-display slds-p-vertical_xx-small">
                                {endDate}
                            </div>
                        </div>
                    </div>

                    <!-- Row 2: Metric and Count -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                        <lightning-combobox label="Time Period Metric" 
                                            value={metric} 
                                            options={metricOptions} 
                                            data-id="metric" 
                                            onchange={handleInputChange} 
                                            required>
                        </lightning-combobox>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_medium">
                        <lightning-input type="number" 
                                         label="Number of Periods" 
                                         value={count} 
                                         data-id="count" 
                                         onchange={handleInputChange} 
                                         required>
                        </lightning-input>
                    </div>
                </div>
            </div>

            <!-- Modal Footer -->
            <footer class="slds-modal__footer">
                <button class="slds-button slds-button_neutral" onclick={handleCancel}>Cancel</button>
                <button class="slds-button slds-button_brand" onclick={handleSave}>Generate Quote</button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open" role="presentation"></div>
</template>
