<template>
    <div class="doc-wrapper">
        <div class="doc-layout">
            <!-- Left: Version List -->
            <div class="versions-card">
                <div class="card-header">
                    <div class="card-title-row">
                        <h3 class="card-title">Version History</h3>
                        <span class="version-badge">{versionCountLabel}</span>
                    </div>
                    <div class="card-actions">
                        <button class="btn" onclick={handleDownloadPdf} disabled={noVersionSelected}>
                            ⬇ Download
                        </button>
                    </div>
                </div>

                <div class="versions-list">
                    <template if:true={hasVersions}>
                        <template for:each={versions} for:item="v">
                            <div key={v.Id}
                                 class={v.cardClass}
                                 onclick={handleVersionSelect}
                                 data-id={v.Id}>

                                <div class="ver-top">
                                    <span class={v.badgeClass}>{v.statusLabel}</span>
                                    <span class="ver-time">{v.timeAgo}</span>
                                </div>

                                <div class="ver-label">{v.Version_Label__c}</div>
                                <div class="ver-title">{v.Title__c}</div>

                                <template if:true={v.Description__c}>
                                    <p class="ver-desc">{v.Description__c}</p>
                                </template>

                                <div class="ver-footer">
                                    <div class="ver-user">
                                        <div class="ver-avatar">{v.initials}</div>
                                        <span class="ver-username">{v.CreatedBy.Name}</span>
                                    </div>
                                    <span class="ver-filetype">PDF</span>
                                </div>
                            </div>
                        </template>
                    </template>

                    <template if:false={hasVersions}>
                        <div class="empty-state">
                            <div class="empty-icon">📄</div>
                            <p class="empty-title">No PDFs generated yet</p>
                            <p class="empty-sub">Use "Generate PDF" in the header to create your first document.</p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Right: Preview -->
            <div class="preview-card">
                <template if:true={isLoading}>
                    <div class="preview-loading">
                        <div class="spinner"></div>
                        <p>Loading preview…</p>
                    </div>
                </template>

                <template if:true={selectedVersionUrl}>
                    <div class="preview-frame">
                        <iframe src={selectedVersionUrl}
                                class="pdf-iframe"
                                title="PDF Preview"
                                onload={handleIframeLoad}
                                onerror={handleIframeError}></iframe>
                    </div>
                </template>

                <template if:true={showPlaceholder}>
                    <div class="preview-empty">
                        <div class="empty-icon">📄</div>
                        <p class="empty-title">Select a version to preview</p>
                        <p class="empty-sub">Click on any version from the sidebar to view the document.</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
