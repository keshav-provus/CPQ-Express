<template>
    <div class="doc-wrapper">
        <div class="doc-layout">
            <!-- Left: Version List -->
            <div class="versions-card">
                <div class="card-header">
                    <div class="card-title-row">
                        <h3 class="card-title">Version History</h3>
                        <span class="version-badge">{versionCountLabel}</span>
                    </div>
                </div>

                <div class="versions-list">
                    <template if:true={hasVersions}>
                        <template for:each={versions} for:item="v">
                            <div key={v.Id}
                                 class={v.cardClass}
                                 onclick={handleVersionSelect}
                                 data-id={v.Id}>

                                <div class="ver-top">
                                    <span class={v.badgeClass}>{v.statusLabel}</span>
                                    <span class="ver-time">{v.timeAgo}</span>
                                </div>

                                <div class="ver-label">{v.VersionLabel}</div>
                                <div class="ver-title">{v.Title}</div>

                                <template if:true={v.Description}>
                                    <p class="ver-desc">{v.Description}</p>
                                </template>

                                <div class="ver-footer">
                                    <div class="ver-user">
                                        <div class="ver-avatar">{v.initials}</div>
                                        <span class="ver-username">{v.CreatedByName}</span>
                                    </div>
                                    <span class="ver-filetype">PDF</span>
                                </div>
                            </div>
                        </template>
                    </template>

                    <template if:false={hasVersions}>
                        <div class="empty-state">
                            <div class="empty-icon">📄</div>
                            <p class="empty-title">No PDFs generated yet</p>
                            <p class="empty-sub">Use "Generate PDF" in the header to create your first document.</p>
                        </div>
                    </template>
                </div>
            </div>
            <!-- Right: Preview -->
            <div class="preview-card">
                <template if:true={hasSelectedVersion}>
                    <div class="preview-content">
                        <!-- Preview image iframe -->
                        <div class="preview-image-wrap">
                            <iframe src={previewIframeUrl}
                                    style="width: 100%; height: 100%; border: none; min-height: 480px;"
                                    title="Document Preview">
                            </iframe>
                        </div>

                        <!-- Action bar at bottom -->
                        <div class="preview-actions">
                            <div class="preview-info">
                                <span class="preview-ver-name">{selectedVersionLabel}</span>
                                <span class="preview-ver-title">{selectedVersionTitle}</span>
                            </div>
                            <div class="preview-btns">
                                <button class="btn" onclick={handleOpenPreview}>
                                    Open Fullscreen
                                </button>
                                <button class="btn btn-primary" onclick={handleDownloadPdf}>
                                    ⬇ Download
                                </button>
                            </div>
                        </div>
                    </div>
                </template>

                <template if:false={hasSelectedVersion}>
                    <div class="preview-empty">
                        <div class="empty-icon">📄</div>
                        <p class="empty-title">Select a version to preview</p>
                        <p class="empty-sub">Click on any version from the sidebar to view the document.</p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</template>
