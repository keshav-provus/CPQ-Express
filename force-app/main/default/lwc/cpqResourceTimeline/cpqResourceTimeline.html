<template>
    <div class="timeline-card">
        <div class="header">
            <h2 class="title">Resource Utilization Timeline</h2>
            <div class="controls">
                <lightning-button-icon icon-name="utility:refresh" variant="bare" onclick={handleRefresh}></lightning-button-icon>
            </div>
        </div>

        <div class="legend">
            <template for:each={legendItems} for:item="item">
                <div key={item.label} class="legend-item">
                    <span class={item.dotClass}></span>
                    <span>{item.label}</span>
                </div>
            </template>
        </div>

        <div class="timeline-container">
            <div class="timeline-viz" lwc:ref="timelineViz">
                <!-- Grid Lines -->
                <div class="grid-lines">
                    <template for:each={gridLines} for:item="line">
                        <div key={line.id} class="grid-line"></div>
                    </template>
                </div>

                <!-- Usage Lane -->
                <div class="usage-lane">
                    <template if:true={hasData}>
                        <template for:each={usageBlocks} for:item="block">
                            <div key={block.id} 
                                 class={block.className} 
                                 style={block.style}
                                 title={block.label}
                                 data-quote-id={block.quoteId}
                                 onclick={handleBlockClick}>
                                {block.text}
                            </div>
                        </template>
                    </template>
                    <template if:false={hasData}>
                        <div class="slds-align_absolute-center slds-text-color_weak slds-p-around_large">
                            No utilization data for this period.
                        </div>
                    </template>
                </div>

                <!-- Date Labels -->
                <div class="date-labels">
                    <template for:each={dateLabels} for:item="label">
                        <span key={label.id} class="date-label">{label.text}</span>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
