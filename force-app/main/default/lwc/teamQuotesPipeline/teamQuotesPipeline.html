<template>
    <lightning-card title="Team Pipeline Overview" icon-name="standard:dashboard">
        <template if:true={isLoading}>
            <div class="spinner-container">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>
        <template if:false={isLoading}>
            <div class="slds-p-around_medium">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-p-bottom_small">
                        <div class="pipeline-card pipeline">
                            <lightning-icon icon-name="utility:trending" size="small" class="card-icon"></lightning-icon>
                            <p class="card-value">{formattedPipeline}</p>
                            <p class="card-label">Total Pipeline</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-p-bottom_small">
                        <div class="pipeline-card margin">
                            <lightning-icon icon-name="utility:percent" size="small" class="card-icon"></lightning-icon>
                            <p class="card-value">{formattedMargin}%</p>
                            <p class="card-label">Avg Margin</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-p-bottom_small">
                        <div class="pipeline-card pending">
                            <lightning-icon icon-name="utility:clock" size="small" class="card-icon"></lightning-icon>
                            <p class="card-value">{pendingApproval}</p>
                            <p class="card-label">Pending Approval</p>
                        </div>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-large-size_1-of-4 slds-p-bottom_small">
                        <div class="pipeline-card monthly">
                            <lightning-icon icon-name="utility:date_input" size="small" class="card-icon"></lightning-icon>
                            <p class="card-value">{thisMonthQuotes}</p>
                            <p class="card-label">This Month</p>
                        </div>
                    </div>
                </div>
            </div>
        </template>
    </lightning-card>
</template>
