<template>
    <div class="quotes-panel">
        <div class="panel-header">
            <div>
                <h3 class="panel-title">Quotes to Approve</h3>
                <p class="panel-subtitle">Pending review and signatures</p>
            </div>
            <div class="panel-icon-wrap">
                <span class="panel-icon">⏳</span>
            </div>
        </div>

        <div class="quotes-list">
            <template for:each={displayQuotes} for:item="quote">
                <div key={quote.Id} class="quote-card" onclick={handleQuoteClick} data-id={quote.Id}>
                    <div class="quote-top">
                        <div>
                            <h4 class="quote-name">{quote.displayName}</h4>
                            <p class="quote-meta">{quote.ownerName} • {quote.timeAgo}</p>
                        </div>
                        <span class="quote-amount">{quote.formattedAmount}</span>
                    </div>
                    <div class="quote-progress">
                        <div class="avatar-stack">
                            <div class="avatar">{quote.initials}</div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" style={quote.progressStyle}></div>
                        </div>
                        <span class="progress-label">{quote.statusLabel}</span>
                    </div>
                </div>
            </template>
            <template if:false={hasQuotes}>
                <div class="empty-state">
                    <span class="empty-icon">✅</span>
                    <p class="empty-text">All quotes are approved</p>
                </div>
            </template>
        </div>

        <button class="view-all-btn" onclick={handleBulkApprove}>
            View All Pending Approvals
        </button>
    </div>
</template>
