<template>
    <div class="pending-panel">
        <!-- Sticky Header -->
        <div class="panel-header">
            <h3 class="panel-title">Quotes to Approve</h3>
            <span class="total-badge">{totalLabel}</span>
        </div>

        <!-- Scrollable Quote List -->
        <div class="quote-list">
            <template if:true={quotes}>
                <template if:true={hasQuotes}>
                    <template for:each={formattedQuotes} for:item="quote">
                        <div key={quote.Id} class="quote-card" onclick={handleNavigateToQuote} data-id={quote.Id}>
                            <div class="quote-card-top">
                                <span class="quote-number">{quote.Name}</span>
                                <span class={quote.urgencyClass}>{quote.urgencyLabel}</span>
                            </div>
                            <div class="quote-account">{quote.AccountName}</div>
                            <div class="quote-card-bottom">
                                <span class="quote-amount">{quote.formattedAmount}</span>
                                <span class="material-symbols-outlined chevron-icon">chevron_right</span>
                            </div>
                        </div>
                    </template>
                </template>
                <template if:false={hasQuotes}>
                    <div class="empty-state">
                        <div class="empty-icon">✓</div>
                        <p class="empty-text">All caught up!</p>
                        <p class="empty-sub">No quotes pending approval</p>
                    </div>
                </template>
            </template>
            <template if:false={quotes}>
                <div class="loading-state">
                    <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                </div>
            </template>
        </div>

        <!-- Bulk Approve Footer -->
        <template if:true={hasQuotes}>
            <div class="panel-footer">
                <button class="bulk-approve-btn" onclick={handleBulkApprove}>
                    Bulk Approve
                </button>
            </div>
        </template>
    </div>
</template>
